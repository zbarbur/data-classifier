name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,meta]"

      - name: Install DVC
        run: pip install 'dvc[gs]'

      - name: Pull test fixtures from DVC
        # GCS auth requires Workload Identity Federation or a service account key.
        # Add google-github-actions/auth step with secrets.GCS_SA_KEY or
        # secrets.WIF_PROVIDER before enabling this in CI.
        # For now, fixtures are skipped on CI runners without GCS credentials;
        # tests that require corpus fixtures are marked accordingly.
        run: dvc pull tests/fixtures/corpora.dvc || echo "DVC pull skipped (no GCS credentials on this runner)"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v

      - name: Docs build check
        if: matrix.python-version == '3.12'
        run: mkdocs build --strict

  lint-and-test-ml:
    # Verifies the [ml] extras stack installs cleanly on a fresh runner
    # and that GLiNER2Engine imports + constructs without errors. This
    # is the regression guard Sprint 7 close asked for — an [ml]-enabled
    # venv that silently drops findings regex-only CI never sees.
    #
    # SCOPE: install + import + construct. NOT real inference.
    #
    # DATA_CLASSIFIER_DISABLE_ML=1 is PERMANENT on this job (not a
    # temporary flag). Real GLiNER2 inference requires the ONNX model,
    # which lives in the private AR Generic repo `data-classifier-models`
    # in `dag-bigquery-dev`. GitHub-hosted runners have no ambient GCP
    # credentials, and Mode 2 in gliner_engine.py's loader falls back to
    # HuggingFace — which BQ already saw 429-rate-limit us in prod. So
    # without Workload Identity Federation, CI cannot reach the model
    # and cannot run real inference without regressing the rate-limit
    # issue.
    #
    # Real-inference CI is tracked as a Sprint 9+ item
    # (`ml-ci-real-inference-via-workload-identity-federation`) that
    # adds a google-github-actions/auth step, runs
    # `python -m data_classifier.download_models`, and removes this
    # kill-switch. Until then, real-inference coverage lives in:
    #   - tests/test_download_models.py (unit)
    #   - local pre-merge runs (`pytest tests/ -v` with [ml] installed
    #     and ONNX model in ~/.cache/data_classifier/models/gliner_onnx)
    #   - the Item 2 investigation run that pinned gap-suppression
    runs-on: ubuntu-latest
    env:
      DATA_CLASSIFIER_DISABLE_ML: "1"
    strategy:
      matrix:
        # Python 3.12 only — gliner's build dependencies may not have
        # wheels for py3.13 yet, and py3.11 adds no signal beyond 3.12
        # for the install-verification value this job delivers.
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies including ml extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,meta,ml]"

      - name: Diagnostics venv and ml package versions
        run: |
          python -c "import sys; print('python:', sys.executable)"
          python -c "import sys; print('version:', sys.version)"
          pip list | grep -E '^(gliner|onnxruntime|data_classifier|scikit-learn|numpy)' || true

      - name: Verify ML engine imports and constructs
        # Does NOT load the model — just confirms the GLiNER2Engine class
        # can be instantiated with the installed [ml] extras. This is the
        # Sprint 5 regression guard: an engine that imports but cannot
        # construct means a runtime ImportError in consumer deployments.
        run: |
          python -c "from data_classifier.engines.gliner_engine import GLiNER2Engine; e = GLiNER2Engine(); print('gliner2 engine constructed; name:', e.name, 'order:', e.order)"

      - name: Run tests with ml disabled at runtime
        run: pytest tests/ -v

  install-test:
    # Builds a wheel from the current checkout and installs it into a fresh
    # venv (no editable install, no dev extras), then runs a smoke test that
    # imports the public API, walks bundled YAML/JSON resources via
    # importlib.resources, and runs an end-to-end EMAIL classification.
    #
    # Catches packaging regressions like the Sprint 5 bug where
    # data_classifier/config/engine_defaults.yaml silently failed to ship in
    # the wheel because the config/*.yaml package-data glob was missing.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel

      - name: Create fresh venv and install wheel (no dev extras, no editable)
        run: |
          python -m venv /tmp/smoke_venv
          /tmp/smoke_venv/bin/pip install --upgrade pip
          /tmp/smoke_venv/bin/pip install dist/*.whl

      - name: Run install smoke test (from outside repo)
        env:
          REPO_DIR: ${{ github.workspace }}
        run: |
          cd /tmp
          /tmp/smoke_venv/bin/python "$REPO_DIR/scripts/install_smoke_test.py"

      - name: Smoke test download_models CLI entry point
        # Verifies that the data-classifier-download-models console script is
        # registered by the wheel and that the module imports cleanly in a
        # Python env with only the base extras installed. Does NOT download
        # the actual model — just exercises the --help plumbing so a broken
        # entry point (missing pyproject script, import error, heavy dep
        # leaking into module top-level) fails CI.
        run: |
          /tmp/smoke_venv/bin/data-classifier-download-models --help
          /tmp/smoke_venv/bin/python -m data_classifier.download_models --help

  browser-parity:
    # Regenerates JS assets from the current Python source, builds the
    # browser bundle, runs Vitest unit tests and Playwright differential
    # tests. Catches Python changes that silently break the JS port.
    # Runs once (py3.12 + Node 20) after Python tests pass.
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install DVC
        run: pip install 'dvc[gs]'

      - name: Pull test fixtures from DVC
        run: dvc pull tests/fixtures/corpora.dvc || echo "DVC pull skipped (no GCS credentials on this runner)"

      - name: Run browser parity check
        run: ./scripts/ci_browser_parity.sh
