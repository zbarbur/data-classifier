goal: Partition Nemotron's raw `password` / `CREDENTIAL` bucket by value shape before
  NEMOTRON_TYPE_MAP is applied, so JWT-shaped values route to API_KEY and PEM blocks
  route to PRIVATE_KEY. Completes the Sprint 11 item 1 taxonomy refresh by fixing
  the ground-truth labeling artifact that was previously mis-diagnosed as a scanner
  over-fire bug.
complexity: S
technical_specs:
- "File: tests/benchmarks/corpus_loader.py \u2014 add `_classify_credential_value_shape(value)`\
  \ helper returning one of {API_KEY, PRIVATE_KEY, OPAQUE_SECRET} based on JWT / PEM\
  \ / plaintext shape."
- "File: tests/benchmarks/corpus_loader.py \u2014 add identity entries `API_KEY`,\
  \ `PRIVATE_KEY`, `OPAQUE_SECRET` to NEMOTRON_TYPE_MAP so rewritten records pass\
  \ the type-map lookup."
- "File: tests/benchmarks/corpus_loader.py \u2014 add a pre-mapping pass inside `load_nemotron_corpus`\
  \ that rewrites each record's `entity_type` via the shape helper when the raw label\
  \ is `password` or `CREDENTIAL`."
- "File: tests/test_corpus_loader.py \u2014 new TestNemotronCredentialShapePartitioning\
  \ class with JWT / PEM / plaintext / empty-string regression cases."
