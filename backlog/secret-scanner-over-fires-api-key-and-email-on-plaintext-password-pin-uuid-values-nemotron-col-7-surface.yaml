notes: "RESCOPED 2026-04-14. Original title was Secret scanner over-fires API_KEY\
  \ and EMAIL on plaintext password / PIN / UUID values. A diagnostic spike run against\
  \ Nemotron col_7 showed that: (1) the secret_scanner engine itself produces ZERO\
  \ findings on col_7 \u2014 the parsers find no key=value shape in plaintext secrets.\
  \ (2) The regex engine correctly fires API_KEY on 81 JWT values (100% precision)\
  \ that Nemotron's upstream password bucket happened to contain. (3) No EMAIL finding\
  \ is reproducible. This is not a scanner bug \u2014 it is a corpus labeling artifact:\
  \ the loader routed all password-labeled records to OPAQUE_SECRET, so the correct\
  \ API_KEY predictions scored as FPs against stale ground truth. The fix is a 20-line\
  \ Nemotron-loader patch, not a scanner tune. Original item was P1 bug; rescoped\
  \ to P2 chore. The Sprint 11 item 1 relaxed-AC decision (Option A) stands \u2014\
  \ this follow-up recovers the F1 gap we consciously deferred."
