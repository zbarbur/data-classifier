goal: The secret scanner's regex engine over-fires API_KEY and EMAIL on plaintext
  password, 6-digit PIN, and UUID-ish token strings that should be classified as OPAQUE_SECRET.
  Nemotron col_7 benchmark surfaces this as a recurring FP+FN pair that prevents blind
  F1 from recovering above 0.76, independent of any loader-side taxonomy changes.
complexity: M
technical_specs:
- "Investigation file: data_classifier/engines/regex_engine.py \u2014 identify which\
  \ API_KEY pattern(s) match UUID / plaintext password strings"
- "Investigation file: data_classifier/profiles/standard.yaml \u2014 review API_KEY\
  \ value-level regex (if any) for over-broad matches on entropy-shaped strings"
- "Investigation file: data_classifier/engines/secret_scanner.py \u2014 EMAIL over-firing\
  \ on col_7 is even more surprising; trace why email regex matches UUID-ish strings"
- "File: tests/test_regex_engine.py or tests/test_secret_scanner.py \u2014 new TestApiKeyOverfireOnPlaintextPasswords\
  \ class with regression cases"
- 'Benchmark verification: python -m tests.benchmarks.accuracy_benchmark --corpus
  nemotron --samples 50 --blind after the fix'
description: ''
acceptance_criteria:
- Nemotron col_7 (OPAQUE_SECRET column with plaintext passwords, 6-digit PINs, UUID-ish
  tokens) no longer triggers predicted=API_KEY or predicted=EMAIL in blind mode
- Nemotron blind F1 recovers to >= 0.82 with the fix (Sprint 9 baseline 0.821)
- No regression on true API_KEY or EMAIL positives in SecretBench / gitleaks / detect_secrets
  corpora (at least baseline F1)
- 'Regression tests for the col_7 surface: plaintext passwords like ''G9t$fR2mXk5'',
  ''Ocean99$'', ''RiverFlow@2025'', 6-digit PINs, and UUID-style strings must NOT
  match API_KEY or EMAIL regex'
- Tests pass, lint clean
test_plan:
- "test_api_key_does_not_fire_on_plaintext_password_g9t_dollar \u2014 literal fixture"
- "test_api_key_does_not_fire_on_ocean99_dollar \u2014 literal fixture"
- test_api_key_does_not_fire_on_6_digit_pin
- test_api_key_does_not_fire_on_uuid_style_string
- "test_email_does_not_fire_on_opaque_secret_column \u2014 diagnostic"
- 'Benchmark: nemotron blind F1 >= 0.82 post-fix'
