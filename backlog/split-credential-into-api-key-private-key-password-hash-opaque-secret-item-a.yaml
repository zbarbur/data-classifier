title: Split CREDENTIAL into API_KEY + PRIVATE_KEY + PASSWORD_HASH + OPAQUE_SECRET
  (Item A)
status: doing
priority: P1
category: chore
sprint_target: 8
created: 2026-04-13
updated: 2026-04-13
depends_on: []
tags: []
goal: 'Replace the single CREDENTIAL entity type with 4 deterministic subtypes (API_KEY,
  PRIVATE_KEY, PASSWORD_HASH, OPAQUE_SECRET). Retain ''credential'' as a category
  rollup for consumers. Adds an OPAQUE_SECRET heuristic for high-entropy credential-shaped
  values that don''t match any specific pattern. Rationale: the current single CREDENTIAL
  label conflates 6 distinct detection modalities, muddles training data, and limits
  downstream routing precision. Splitting aligns the schema with how the engines actually
  detect each subtype. Discovered by research-ops drafting; dependency of Item B (pattern
  harvest) and Q8 (specialized opaque-secret meta-classifier).'
complexity: M
technical_specs:
- "File: data_classifier/profiles/standard.yaml \u2014 replace CREDENTIAL rule with\
  \ 4 new rules, each with category: credential"
- "File: data_classifier/patterns/default_patterns.json \u2014 retarget ~10-15 existing\
  \ credential patterns by entity_type"
- "File: data_classifier/patterns/column_names.json \u2014 split credential-related\
  \ column names"
- "File: data_classifier/patterns/secret_key_names.json \u2014 add subtype field per\
  \ entry"
- "File: data_classifier/engines/secret_scanner.py \u2014 replace hardcoded CREDENTIAL\
  \ with subtype emission based on key name"
- "File: data_classifier/engines/heuristic_engine.py \u2014 new opaque_secret_detection()\
  \ function"
- "File: tests/test_opaque_secret.py (new) \u2014 10+ positive and 10+ negative fixtures"
- "File: tests/fixtures/ \u2014 update golden expectations where CREDENTIAL was asserted"
description: ''
acceptance_criteria:
- data_classifier/profiles/standard.yaml has 4 new credential-category rules (API_KEY,
  PRIVATE_KEY, PASSWORD_HASH, OPAQUE_SECRET); no CREDENTIAL rule
- 'All 4 rules declare category: credential for downstream rollup support'
- "data_classifier/patterns/default_patterns.json: existing shape-identifiable credential\
  \ patterns retargeted \u2014 AWS/GitHub/Slack/OpenAI/Stripe etc \u2192 API_KEY,\
  \ PEM markers \u2192 PRIVATE_KEY, $2[aby]$/$argon2[id]$/$scrypt$ prefixes \u2192\
  \ PASSWORD_HASH"
- "PASSWORD_HASH fires ONLY on values with algorithm prefix. Raw hex strings (unprefixed\
  \ SHA-256/SHA-1/MD5) are NOT classified as PASSWORD_HASH \u2014 they go to OPAQUE_SECRET\
  \ or stay unclassified (prevents collisions with ETHEREUM_ADDRESS, transaction hashes,\
  \ file hashes, git SHAs)"
- 'New OPAQUE_SECRET heuristic in data_classifier/engines/heuristic_engine.py: detection
  rule is (entropy > threshold) AND (non-language character frequency) AND (length
  in range 20-200) AND (high per-column distinct ratio) AND (no other engine claimed
  the row)'
- data_classifier/engines/secret_scanner.py emits the correct subtype based on matched
  key name in secret_key_names.json, not the generic CREDENTIAL label
- data_classifier/patterns/column_names.json credential-related column names split
  across the 4 subtypes based on semantic intent
- All existing 1133+ tests pass with fixture updates where CREDENTIAL was asserted
  (some test renames expected)
- New tests/test_opaque_secret.py covers positive cases (high-entropy opaque strings)
  and negative cases (bitcoin addresses, UUIDs, long IDs that are NOT secrets)
- Benchmark F1 on gitleaks/secretbench/detect_secrets corpora is within 0.02 of pre-split
  baseline (non-regression gate)
test_plan:
- 'Unit: each new entity type has >=5 positive + >=5 negative fixtures'
- 'Integration: end-to-end classification on 3 credential corpora (gitleaks, secretbench,
  detect_secrets) produces correct subtype'
- 'Golden fixtures: existing CREDENTIAL expectations remapped'
- 'Regression: full test suite green on venv with [dev,meta,ml]'
- 'Benchmark: pre/post split F1 comparison on credential corpora'
- 'OPAQUE_SECRET edge cases: bitcoin address NOT classified as OPAQUE_SECRET (BITCOIN_ADDRESS
  rule should fire first)'
notes: "Sprint 8 Item A (drafted by research-ops on research/meta-classifier docs/experiments/meta_classifier/queue.md\
  \ lines 1297-1395). Blocks Item B (pattern expansion) and Q8 research experiment.\
  \ SCOPE EXCLUSIONS (explicit): (1) No PASSWORD entity type \u2014 passwords need\
  \ column-name context exclusively; column name engine already handles them. (2)\
  \ No JWT entity type \u2014 folded into API_KEY or OPAQUE_SECRET. (3) No ENCRYPTED_BLOB\
  \ entity type \u2014 indistinguishable from random high-entropy data. (4) No meta-classifier\
  \ changes \u2014 existing v1 shadow model stays with old CREDENTIAL label; Q8 handles\
  \ specialized direction."
