goal: 'Investigate and fix test_regex_engine.py::TestSampleValueMatching::test_ssn_in_samples
  failing when run from a Python env with [ml] extras installed. With GLiNER2 active,
  the test input ([''123-45-6789'', ''987-65-4321'', ''hello world''] under column_name=''data_field'')
  produces only one finding: ORGANIZATION from gliner2 at confidence 0.741, with no
  SSN finding despite a valid regex+validator match on 123-45-6789. Determine root
  cause (orchestrator authority suppression vs aggressive_secondary_suppression vs
  GLiNER replacing rather than adding findings) and fix either the test expectation
  or the orchestrator logic.'
complexity: M
technical_specs:
- "File: data_classifier/orchestrator/orchestrator.py \u2014 review the collision\
  \ resolution, authority gap, agreement boost, and aggressive_secondary_suppression\
  \ logic. The test expects SSN to survive alongside ORGANIZATION; figure out what\
  \ drops it"
- "File: tests/test_regex_engine.py \u2014 the existing test at TestSampleValueMatching::test_ssn_in_samples\
  \ may need its assertion updated if the ML-on behavior is actually correct and the\
  \ test was written before ML landed"
- "File: tests/test_orchestrator_ml_interaction.py (new) \u2014 add a dedicated test\
  \ module exercising regex+ML-engine interactions under various authority and confidence\
  \ scenarios"
- 'Debug command to reproduce: .venv/bin/python -m pytest tests/test_regex_engine.py::TestSampleValueMatching::test_ssn_in_samples
  -v'
