acceptance_criteria:
- google-cloud-dlp installed via new optional extra [bench-compare-cloud] (sibling
  of [bench-compare])
- Adapter (tests/benchmarks/comparators/cloud_dlp_comparator.py) translates ColumnInput
  to DLP inspect_content call, maps Finding.info_type + likelihood enum to ClassificationFinding
  with BOTH strict 1:1 and aggressive mappings
- 'Likelihood enum quantized to float scores: VERY_LIKELY=0.95, LIKELY=0.80, POSSIBLE=0.55,
  UNLIKELY=0.30, VERY_UNLIKELY=0.10 (documented)'
- InfoType mapping appendix published in docs/benchmarks/cloud_dlp_mapping.md documenting
  strict and aggressive decisions for the ~30 mapped InfoTypes (PERSON_NAME, EMAIL_ADDRESS,
  US_SOCIAL_SECURITY_NUMBER, US_HEALTHCARE_NPI, BANK_ROUTING, etc.)
- Consolidated report supports --compare cloud_dlp flag (composable with --compare
  presidio)
- Runs LOCAL ONLY (not in CI); comparison result JSON committed to docs/benchmarks/history/dlp_comparison_sprint_{N}.json
  for reproducibility
- Benchmark run cost well under DLP free tier (1GB/month) for 50 samples x 10 cols
  x few-KB payloads; cost tracking note in report
- 'Graceful failure when GOOGLE_APPLICATION_CREDENTIALS not set: comparator exits
  with clear error, does not break default benchmark run'
- 15+ tests for adapter, InfoType mapping, likelihood normalization (can mock DLP
  client for tests)
- Lint clean
test_plan:
- 'Unit tests (mocked DLP client): InfoType mapping (strict + aggressive), likelihood
  enum quantization, empty findings handling, auth error surfacing'
- 'Integration: 20-sample fixture run against real DLP (local only, manual gate)'
- 'Manual: full benchmark with --compare cloud_dlp, verify report + committed JSON
  artifact'
