goal: Enable regex engine to adjust per-pattern confidence thresholds based on an
  optional SchemaPrior on ColumnInput, feature-flagged off by default, validated with
  hand-written priors against four benchmark cases, producing a go/no-go recommendation
  for the Sprint N+1 LLM-scanner investment.
complexity: M
technical_specs:
- "New file: data_classifier/profiles/schema_profile.py \u2014 SchemaProfile/SchemaPrior\
  \ dataclasses, load_schema_profile(), O(1) fqn lookup, YAML validator with line\
  \ numbers"
- "New file: data_classifier/orchestrator/schema_prior.py \u2014 adjust_threshold(base_threshold,\
  \ prior_for_entity) function; MAX_THRESHOLD_DELTA=0.2, PRIOR_NEUTRAL=0.5 constants;\
  \ starting implementation linear-symmetric-slope-0.4 (tunable)"
- "Modified: data_classifier/core/types.py \u2014 add ColumnInput.schema_prior: SchemaPrior\
  \ | None = None field"
- "Modified: data_classifier/orchestrator/orchestrator.py \u2014 accept schema_profile\
  \ parameter in classify_columns(); attach priors by fqn lookup before running engines;\
  \ honor feature flag"
- "Modified: data_classifier/engines/regex_engine.py \u2014 consume column.schema_prior\
  \ when flag on; per-pattern threshold adjustment via adjust_threshold(); debug logging\
  \ per adjustment"
- 'Feature flag: env var DATA_CLASSIFIER_SCHEMA_PRIOR (default off) + classify_columns(use_schema_prior=bool
  | None) parameter; parameter wins; state logged once at init'
- "fqn format v1: {dataset}.{table_name}.{column_name} \u2014 documented in BQ coordination\
  \ doc; revisit if connector passes different shape"
- "New directory: tests/fixtures/schema_profiles/ \u2014 hand-written priors organized\
  \ by benchmark case; adversarial/ subdirectory for graceful-degradation tests"
- "New file: docs/integrations/BQ_SCHEMA_PRIOR_COORDINATION.md \u2014 fqn format,\
  \ responsibilities split, integration pseudocode"
- Benchmark harness extended to accept optional schema profile, run prior-off and
  prior-on passes, decompose F1 by four cases (A/B/C/D)
description: 'Build the consumer side of schema-prior-driven content scanning: ColumnInput.schema_prior
  field, regex engine threshold adjustment, feature flag, hand-written test priors,
  benchmark harness with four-case decomposition (A/B/C/D), kill-switch decision.
  Scanner (producer) is deferred to a follow-up sprint. Full implementation plan in
  docs/plans/schema_prior_consumer.md.'
acceptance_criteria:
- Feature-flagged ON/OFF via env var DATA_CLASSIFIER_SCHEMA_PRIOR and classify_columns(use_schema_prior=)
  parameter; default OFF; full existing test suite passes unchanged with prior off
- schema_profile.yaml v1 format defined, loader validates with line-number errors,
  warns on unknown entity types (forward-compat), rejects unknown version numbers
- ColumnInput.schema_prior field and classify_columns(schema_profile=) parameter plumbed;
  orchestrator attaches priors by fqn lookup; public API documented in CLIENT_INTEGRATION_GUIDE.md
- data_classifier/orchestrator/schema_prior.py adjust_threshold() function implements
  tunable transfer function; contract enforced (no-op at PRIOR_NEUTRAL=0.5, clamped
  to MAX_THRESHOLD_DELTA=0.2, monotonic); unit-tested at edge cases
- Regex engine consumes prior via adjust_threshold() when flag is on; bit-for-bit
  regression test vs current behavior when flag off; per-pattern adjustments logged
  at debug level
- 30-50 hand-written priors committed under tests/fixtures/schema_profiles/ covering
  all four benchmark cases (A/B/C/D) with minimum counts (A:8, B:6, C:10, D:6); adversarial
  priors in separate subdirectory
- Benchmark harness runs prior-off and prior-on against Ai4Privacy + blind eval fixtures;
  report decomposes F1 by case A/B/C/D; committed as docs/sprints/SPRINT10_SCHEMA_PRIOR_BENCHMARK.md
- 'Kill-switch thresholds written BEFORE benchmark runs: Go if Case C +F1 >= 0.03
  AND Case D regression <= 0.01 AND aggregate +F1 >= 0.01; Tune if Case C +0.01-0.03;
  Kill if Case C < 0.01 or Case D regresses > 0.02 or aggregate regresses'
- docs/integrations/BQ_SCHEMA_PRIOR_COORDINATION.md committed; defines fqn format,
  library vs connector responsibilities, ~30 lines of connector pseudocode; no BQ
  repo changes
- 'Sprint completion gate: ruff clean, pytest green, CI passing, benchmark report
  with kill-switch decision committed'
test_plan:
- 'Unit: SchemaProfile loader against valid file, missing file, malformed YAML, unknown
  version, empty profile, invalid prior sums, unknown entity type (warns not fails)'
- "Unit: adjust_threshold() contract \u2014 no-op at PRIOR_NEUTRAL, clamped at extremes,\
  \ monotonic, out-of-range input handling, output stays in [0,1]"
- 'Regression: prior-off regex engine bit-for-bit matches current behavior across
  full existing test suite'
- 'Integration: flag-off + profile passed = no-op; flag-on + no profile = no-op; flag-on
  + profile passed = thresholds adjusted per debug log'
- 'Benchmark: four-case F1 decomposition (A/B/C/D) on Ai4Privacy + blind eval fixtures
  with prior-off vs prior-on; Case C is main signal; Case D must not regress > 0.02'
- 'Graceful degradation: adversarial priors (wrong entity types, malformed, empty,
  missing) do not crash; orchestrator logs warnings and proceeds with base thresholds'
- "Feature-flag state logging verified at orchestrator init for all four (env unset/set\
  \ \xD7 param unset/true/false) combinations"
notes: "Deferred from Sprint 10 to Sprint 11 during Sprint 10 planning (2026-04-14).\
  \ Reasons: (a) the gated-meta-classifier architecture work planned for Sprint 11\
  \ may reshape the consumer side, so committing to the current design now risks rework;\
  \ (b) Sprint 10 capacity is already at 1M + 5S with the secret-dictionary expansion\
  \ item; (c) the full plan doc at docs/plans/schema_prior_consumer.md is solid and\
  \ durable \u2014 deferral costs nothing. Full spec and kill-switch decision still\
  \ apply unchanged when this item picks up in Sprint 11."
