notes: "RESEARCH BACKBONE: research/gliner-context @ 7b2ed91 (pushed to origin 2026-04-14).\
  \ Pass 1 memo at docs/experiments/gliner_context/runs/20260413-2300-pass1/result.md\
  \ on the research branch. Measured +0.0887 macro F1 lift over baseline on n=315\
  \ Ai4Privacy-derived columns (105 templates x 3 seeds) at threshold 0.8, paired\
  \ BCa 95% CI [+0.050, +0.131] -- clears the +0.02 ship gate with substantial margin.\
  \ Robust across thresholds 0.5/0.7/0.8 and across context-kind strata (empty +0.039,\
  \ helpful +0.146, misleading +0.057), meaning the improvement transfers to columns\
  \ with empty or adversarial metadata not just curated ones. Latency +6% at p50,\
  \ well under the +20% gate.\n\nMECHANISM: GLiNER2 is a context-attention NER model\
  \ trained on natural-language sentences. Feeding it raw ' ; '-joined values is out-of-distribution\
  \ input; the attention mechanism has no sentence context to use. Wrapping the values\
  \ in a natural-language prefix containing column/table/description metadata puts\
  \ the input back in the model's training distribution. The improvement is primarily\
  \ false-positive suppression across non-ground-truth entity types (baseline over-fires\
  \ ORGANIZATION, PHONE, PERSON_NAME on columns of numeric strings; S1 eliminates\
  \ most of those FPs).\n\nORG OVER-FIRE RESOLUTION: this mechanism directly resolves\
  \ gliner2-over-fires-organization-on-numeric-dash-inputs-ssn-format-audit-prompt-descriptions-or-add-content-shape-filter.\
  \ Pass 1 measured the baseline firing ORGANIZATION on ~25 columns at threshold 0.8\
  \ despite ORGANIZATION having zero ground-truth support in the corpus; S1 reduces\
  \ this to ~8 false fires -- a ~68%% reduction in the exact pattern that bug tracks.\
  \ The root cause is the same: GLiNER with no grammatical context sees numeric-dash\
  \ strings and guesses ORG because its training distribution for numeric-dash spans\
  \ is biased toward company identifiers; adding 'Column X from table Y' as a prefix\
  \ narrows the plausible interpretation space enough to suppress the ORG guess in\
  \ most cases. File the ORG bug as closed when this item ships (add to acceptance\
  \ criteria).\n\nALSO REFUTED IN PASS 1: research/gliner-context Pass 1 also refuted\
  \ two other strategies. S2 (per-column dynamic label descriptions) was catastrophically\
  \ worse at threshold 0.7 with McNemar (b=39, c=0), p~=0 -- mechanism: injecting\
  \ column context into per-label descriptions creates contradictory prompts that\
  \ corrupt GLiNER's label embeddings. Do not re-propose. S3 (naive keyword-based\
  \ label narrowing) was bimodal (+0.076 helpful, -0.039 misleading); refuted in current\
  \ form but a follow-up S3b with column_name_engine confidence-gating is filed for\
  \ separate research in docs/experiments/gliner_context/queue.md on the research\
  \ branch.\n\nUNBLOCK RELATIONSHIP: the existing promote-gliner-tuning-fastino-base-v1\
  \ item's notes explicitly name 'research/gliner-context context-injection work'\
  \ as the unblock path for its Sprint 9 blocked status. Sprint 9 already landed the\
  \ infrastructure (commit 29db52c: threshold plumbing fix, descriptions_enabled flag,\
  \ ONNX auto-discovery guard, 7 regression tests). After this item ships, fastino\
  \ promotion is a 2-line model_id swap plus the shadow re-benchmark the acceptance\
  \ criteria describe.\n\nNOT YET VALIDATED: Pass 1 measured only on Ai4Privacy at\
  \ fastino v2. The (urchade v1 + S1) acceptance criterion above is the first measurement\
  \ on the current production model -- if S1 does not transfer from fastino to urchade,\
  \ this item may need a design revision before merge. The (fastino + S1) shadow run\
  \ after merge is the second cross-check and is required before promote-gliner-tuning-fastino-base-v1\
  \ can proceed. A Pass 2 cross-corpus run on Nemotron-PII is queued on the research\
  \ branch but not blocking this item -- the full-benchmark acceptance criteria supersede\
  \ Pass 2 because they run against the actual deployed model in the actual benchmark\
  \ pipeline.\n\nHARNESS REUSE: tests/benchmarks/gliner_context/harness.py on the\
  \ research branch contains a pluggable (prompt_builder, label_builder) evaluation\
  \ loop that can be imported into the accuracy_benchmark acceptance-criteria runs\
  \ directly -- no need to re-implement the bootstrap CI / McNemar / context-kind\
  \ stratification logic from scratch. If preserving the harness is valuable for future\
  \ research (S1b short-prompt ablation, S3b confidence-gated narrowing, future context-injection\
  \ variants), consider cherry-picking tests/benchmarks/gliner_context/harness.py\
  \ from research/gliner-context @ 7b2ed91 as part of this item's merge. The STATISTICS_LEARNING_GUIDE.md\
  \ on the research branch is a durable learning reference worth merging to docs/\
  \ under main independently of this item.\n\nRESEARCH PROVENANCE: research branch\
  \ research/gliner-context commits:\n  - d0e1ba9 queue + coordination setup\n  -\
  \ 702d0a8 smoke test + API mapping (discovered that GLiNER2.extract_entities is\
  \ a thin wrapper over create_schema().entities; dict-of-descriptions IS a live path)\n\
  \  - 659a358 first F1 run n=21 (preliminary)\n  - 7b2ed91 Pass 1 n=315 (memo, harness,\
  \ learning guide, queue updates)"
