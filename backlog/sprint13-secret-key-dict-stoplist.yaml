title: 'Sprint 13: Secret-key dictionary stoplist — reject `*_address` / `*_field` / `*_id` compound names'
status: backlog
priority: P2
category: bugfix
sprint_target: 13
created: 2026-04-16
updated: 2026-04-16
depends_on: []
