goal: >
  Add a compound-key-name stoplist to secret_key_names.json so the
  secret_scanner stops flagging UI / identifier / blockchain-address
  variable names as credentials. Surfaced by S0 audit
  (research/prompt-analysis 50K WildChat scan): 4 confirmed FPs out of
  59 credential-family hits (~7% FP rate) all came from compound names
  like `token_address` (Solana public address), `password_field`
  (Selenium UI variable), `session_key = "decrypted cipher text"` (literal
  description in code).
complexity: S
technical_specs:
- 'Extend secret_key_names.json schema to support a stoplist field
  alongside the existing key dictionary. Stoplist matches whole keys
  (case-insensitive, or with trailing suffix matching).'
- 'Add suffix-rejection patterns for compound names that are typically
  NOT credential values:
    "_address" (blockchain addresses, network addresses, wallet
    addresses are PUBLIC by design)
    "_field" (UI form field variables — Selenium, React, etc.)
    "_id" (IDs are identifiers, not secrets — though some IDs ARE
    sensitive like session_id; case-by-case)
    "_name" (variable names, label text)
    "_input" (form input variables)
    "_label" (UI label text)
    "_placeholder" (UI placeholder text)
    "_url" (URLs are not credentials, even auth URLs)
    "_endpoint" (endpoints are not credentials)'
- 'Edge cases to keep flagged (do NOT add to stoplist):
    "session_id" / "auth_id" — session identifiers ARE sensitive
    "_token" suffix should remain flagged (token IS a credential)
    "_secret" suffix should remain flagged
    "_key" suffix should remain flagged (caveat: file_key, primary_key
     might be legitimate non-secrets — could refine later if FP rate
     surfaces)'
- 'Update secret_scanner.py to apply the stoplist before scoring the
  key name. Implementation: after extracting key_name from
  parse_key_values, check if key_name (lowercased) ends with any
  stoplist suffix. If yes, score as 0 (skip).'
- 'Tests: tests/test_secret_scanner_stoplist.py with the 4 confirmed
  S0 FP cases as fixtures (token_address, password_field, session_key
  description, generic placeholder values). Each must NOT produce a
  finding.'
description: |
  Surfaced from research/prompt-analysis S0 (50K WildChat scan,
  2026-04-16). The secret_scanner key + entropy heuristic correctly
  flags `password = "X"` style code, but it ALSO flags variable names
  that happen to contain "secret-bearing" words but are actually
  identifiers / UI fields / public addresses.

  Concrete S0 evidence (from s0_credentials.jsonl):
    - turn 2247: `def air_drop(address, token_address, airdrop_amount)`
      → secret_scanner flagged `token_address` (Solana wallet address,
      PUBLIC by blockchain design, ZERO secret content)
    - turn 13232: `password_field = wait.until(expected_conditions.
      visibility_of_element_located(...))` → flagged the Selenium
      element handle as a password
    - turn N (turn ~12 in OPAQUE_SECRET audit): `session_key = "decrypted
      cipher text"` → flagged the literal text as a session key

  These FPs all share a pattern: the key name CONTAINS a secret-bearing
  substring ("token", "password", "key") but the FULL key name is a
  compound that means something different (an address, a UI element,
  a label, a literal description).

  Fix is a small dictionary update + a pre-scoring check. Estimated
  ~50 LOC + tests. Improvement to credential-side precision is
  measurable: ~7% FP reduction on the S0 sample.
acceptance_criteria:
- secret_key_names.json schema extended with stoplist (or equivalent)
- secret_scanner.py applies stoplist before scoring
- All 4 S0 FP cases produce zero findings after fix
- The 4 S0 confirmed real positives (stcmalta, walhalax, Telegram,
  Facebook Graph) still produce findings (no regression)
- Lint + format clean, full test suite green
- Family benchmark does not regress
test_plan:
- 'Unit tests on the 4 S0 FP cases — must NOT match'
- 'Unit tests on the 10 S0 real-positive cases (decoded from
  s0_credentials.jsonl) — must still match'
- 'Re-run scripts/s0_curate_credentials.py on 50K after fix; expect
  credential FP rate to drop from ~7% to <2%'
- 'Family benchmark regression check'
notes: |
  Estimated 0.5 day total (~50 LOC + tests).

  Surfaced 2026-04-16 by S0 manual audit of 21 OPAQUE_SECRET hits
  in the 1K corpus extract. The 4 FPs identified are the smallest
  possible viable set — re-running on full 50K may surface more
  compound names that need stoplist additions (extension point: new
  stoplist suffixes added in subsequent sprints based on production
  telemetry).

  This is the "secret_scanner-side" precision pass complementing the
  separate "regex-side" precision pass (sprint13-s0-pattern-precision-pass.yaml,
  SWIFT_BIC + IPv4 fixes).

  Note on session_id specifically: kept in flagged-name-list because
  session IDs leak in DLP scenarios. The user-set distinction is
  "session_id is sensitive even though _id usually means identifier."
  This nuance argues for explicit allowlist (these specific *_id
  names ARE sensitive) within an _id stoplist suffix.

