- "Unit: tests/test_secret_scanner.py::TestNewDictionaryEntries::test_new_entry_fires_with_expected_tier_and_subtype\
  \ \u2014 parametrized over every net-new entry"
- "Unit: tests/test_secret_scanner.py::TestIngestionScript::test_ingest_script_is_idempotent\
  \ \u2014 runs the script twice, second run emits 0 net-new entries"
- "Unit: tests/test_secret_scanner.py::TestIngestionScript::test_all_new_entries_have_required_fields\
  \ \u2014 schema validation"
- 'Invariant: tests/test_secret_scanner.py::TestDictionaryHealth::test_dictionary_has_no_duplicate_patterns
  (full dict, existing + new)'
- 'Invariant: tests/test_secret_scanner.py::TestDictionaryHealth::test_dictionary_scores_in_valid_range
  (scores in [0,1], tiers in {definitive, strong, contextual})'
- 'Manual benchmark: python3 -m tests.benchmarks.accuracy_benchmark with secretbench
  + gitleaks pre- and post-merge, compare credential recall and precision'
- 'Manual benchmark: nemotron credential subset non-regression check as secondary
  generalization gate'
notes: "Explicit non-goals: (1) No XGBoost \u2014 subsumes the empty ml-optimized-secret-scoring-parameters-xgboost-on-18-features\
  \ item closed 2026-04-14. (2) No threshold changes to heuristic_engine.py opaque_secret_detection\
  \ \u2014 threshold validation is a separate Sprint 11 item. (3) No regex value-pattern\
  \ additions \u2014 dictionary only this sprint. (4) No new engine. (5) Hard 95-entry\
  \ ceiling \u2014 if harvest surfaces more good candidates, file the remainder as\
  \ a Sprint 11 follow-up. Why the ceiling matters: the stale Kingfisher-L item targets\
  \ 200-500 with full dedup, per-entry fixtures, and comprehensive audit. Exceeding\
  \ 95 here blurs the M-sibling boundary and starts reabsorbing L complexity."
