tags: []
goal: Grow secret_key_names.json from 88 to ~170 entries by harvesting 80 net-new
  credential key-name patterns from Kingfisher + gitleaks + Nosey Parker across 6
  gap categories, with hard 95-entry ceiling to preserve the M/L scope boundary.
complexity: M
technical_specs:
- "New script scripts/ingest_credential_patterns.py \u2014 pulls pinned revisions\
  \ of Kingfisher (Apache 2.0) + gitleaks (MIT) + Nosey Parker (Apache 2.0), parses\
  \ YAML/TOML rule files, deduplicates with precedence Kingfisher > gitleaks > Nosey\
  \ Parker, filters to key-name patterns only (not value-regex), emits entries in\
  \ secret_key_names.json schema. Idempotent and re-runnable."
- "Dictionary update in data_classifier/patterns/secret_key_names.json \u2014 append\
  \ ~80 net-new entries. Each entry requires: pattern (lowercase), score, match_type\
  \ (substring/word_boundary/suffix), subtype (API_KEY/OPAQUE_SECRET/PRIVATE_KEY/PASSWORD_HASH).\
  \ Score caps: 0.95 definitive, 0.80 strong, 0.65 contextual \u2014 matching current\
  \ conventions derived from secret_scanner.py:361-374."
- Top-of-file scoring convention header comment block added to secret_key_names.json
  (~20 lines) documenting the score/tier/subtype semantics that currently live only
  in secret_scanner.py:361-374.
- "New doc docs/process/CREDENTIAL_PATTERN_SOURCES.md \u2014 per-entry attribution\
  \ table: pattern_id, upstream_name, license, upstream_url, our_score, our_tier,\
  \ our_subtype, attribution_date. One row per net-new entry. Required by the stale\
  \ L-item's license-compliance spec."
- "docs/process/LICENSE_AUDIT.md extended with Kingfisher, gitleaks, Nosey Parker\
  \ rows \u2014 Apache 2.0 / MIT / Apache 2.0 \u2014 plus the pinned-revision SHAs\
  \ used for the harvest."
- "Placeholder expansion in data_classifier/patterns/known_placeholder_values.json\
  \ \u2014 add any obvious placeholder literals surfaced by harvested entries (e.g.,\
  \ <YOUR_API_KEY>) to prevent FP fires."
- 'Test coverage: new TestNewDictionaryEntries parametrized class in tests/test_secret_scanner.py,
  one test per net-new entry asserting _score_key_name returns the recorded (score,
  tier, subtype) tuple. Template from detect_secrets_fixtures.json type-field taxonomy.'
- 'Target gap categories with minimum counts: SaaS APIs (Kingfisher''s sweet spot:
  Datadog, PagerDuty, Okta, Auth0, Sentry, Cloudflare, Vercel, etc) min 30; Cloud
  providers (DigitalOcean, Linode, IBM, Oracle, Alibaba, etc) min 15; CI/CD tokens
  (ci_token, deploy_token, github_actions_token, jenkins_token, etc) min 12; Database
  credentials (Elasticsearch, CouchDB, RabbitMQ, Cassandra, MSSQL, etc) min 8; OAuth/JWT
  variants (id_token OpenID, token_secret OAuth 1.0, saml, oidc) min 6; Password/session/crypto
  (admin_password, root_password, session_secret, csrf_secret, aes_key, iv) min 13.'
- 'Explicitly excluded sources (license-incompatible, noted in LICENSE_AUDIT.md):
  trufflehog AGPL-3.0 (consult for gap-ID only, no copy), Semgrep SRL v1.0, Atlassian
  SAST LGPL-2.1.'
description: "Grow data_classifier/patterns/secret_key_names.json from 88 to ~170\
  \ entries by harvesting 80 net-new credential key-name patterns from Kingfisher\
  \ (primary ~50), gitleaks (secondary ~20), and Praetorian Nosey Parker (precision\
  \ cross-check ~10). Scopes the stale harvest-kingfisher-... L-complexity item down\
  \ to an M-sized Sprint 10 sibling with a hard 95-entry ceiling. Target 6 gap categories:\
  \ SaaS APIs (30), cloud providers (15), CI/CD tokens (12), database credentials\
  \ (8), OAuth/JWT variants (6), password/session/crypto variants (13). Dictionary-based\
  \ detection is the dominant signal \u2014 79.5% of current entries fire at definitive\
  \ tier (score >= 0.90) on key-name match alone per secret_scanner.py:361-374, so\
  \ every new 0.90+ entry is a direct additive recall gain. Full plan in ~/.claude/plans/floating-wandering-dove.md."
acceptance_criteria:
- "scripts/ingest_credential_patterns.py exists, runs end-to-end in <= 5 minutes,\
  \ produces >= 80 net-new entries (ceiling 95 \u2014 hard guardrail against overshooting\
  \ into Sprint 11 long-tail territory)"
- secret_key_names.json grows from 88 to >= 168 entries with zero duplicate pattern
  values (defensive invariant test)
- 'Every net-new entry has all 5 required fields populated: pattern, score, match_type,
  tier (or derivable), subtype'
- At least 60% of net-new entries are definitive tier (score >= 0.90), matching the
  current 79.5% distribution shape
- 'All 6 gap categories meet minimum entry counts: SaaS 30, Cloud 15, CI/CD 12, DB
  8, OAuth 6, password/session/crypto 13'
- Scoring convention header comment present at top of secret_key_names.json
- docs/process/CREDENTIAL_PATTERN_SOURCES.md exists with one row per net-new entry
  and license attribution per source
- docs/process/LICENSE_AUDIT.md updated with Kingfisher + gitleaks + Nosey Parker
  rows including pinned-revision SHAs
- tests/test_secret_scanner.py::TestNewDictionaryEntries parametrized over all net-new
  entries, all passing
- Existing tests/test_secret_scanner*.py and tests/test_opaque_secret.py continue
  passing unchanged
- 'Sprint-close benchmark: secretbench_sample.json credential recall increases by
  >= 0.02 vs Sprint 9 baseline'
- 'Sprint-close benchmark: gitleaks_fixtures.json credential recall increases by >=
  0.03 vs Sprint 9 baseline'
- 'Sprint-close benchmark: neither secretbench nor gitleaks credential precision drops
  by > 0.01 (FP non-regression gate)'
- Nemotron credential subset F1 shows non-regression (wider corpus generalization
  check)
- 'Sprint completion gate: ruff clean, pytest green, CI passing, benchmark memo referenced
  from sprint handover'
