title: "Expand secret key-names dictionary \u2014 Kingfisher + gitleaks + Nosey Parker,\
  \ ~80 net-new entries (Sprint 10 M sibling of Kingfisher-L)"
status: done
priority: P2
category: feature
sprint_target: 10
created: 2026-04-14
updated: 2026-04-14
