notes: 'Deferred from S17 to S18 (2026-04-28): WildChat GT labels are detection-output-dependent.
  The S17 WASM merge changes detection behavior; doing GT review pre-merge would tie
  labels to deprecated outputs. Reviewing post-merge means labels reflect what ships.'
