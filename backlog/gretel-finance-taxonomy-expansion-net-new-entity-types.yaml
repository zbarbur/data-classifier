- "Unit: tests/test_corpus_loader.py::TestGretelFinanceLoader::test_gretel_finance_type_map_coverage\
  \ updated to assert 18/27 coverage"
- "Benchmark: Sprint 11 close benchmark shows no regression on existing types and\
  \ reports per-type F1 for each new type"
notes: |
  SURFACED FROM SPRINT 10 ingest-gretel-pii-finance-multilingual.

  Background: the Sprint 10 Gretel-finance ingest discovered 27 unique span
  labels in the 100-row discovery sample. 15 of them mapped cleanly to
  existing data_classifier entity types and were covered by
  GRETEL_FINANCE_TYPE_MAP. 12 remained unmapped:
    - 3 are net-new taxonomy candidates (this item): account_pin, bban,
      driver_license_number
    - 9 are generic/ambiguous labels with no meaningful mapping: company,
      customer_id, employee_id, user_name, date, date_time, time,
      credit_card_security_code, local_latlng
  The Sprint 10 backlog item ACC required that the net-new types be filed
  here rather than added silently to the production vocabulary.

  DEVIATION FROM SPRINT 10 ACC #2: the original Sprint 10 ACC listed FOUR
  net-new types: account_pin, swift_bic_code, bban, driver_license_number.
  Investigation during Sprint 10 discovery showed that SWIFT_BIC already
  EXISTS in data_classifier/profiles/standard.yaml (line 186) as a
  production entity type, and the Sprint 9 NEMOTRON_TYPE_MAP already maps
  its 'swift_bic' raw label to that existing type. Mapping
  Gretel-finance's 'swift_bic_code' raw label to the same existing
  SWIFT_BIC type is therefore NOT a net-new taxonomy addition, and Sprint
  10 mapped it as such. Only 3 genuinely-net-new types remain for this
  Sprint 11 item.

  Expected impact: raises Gretel-finance label-vocab coverage from 55% to
  67%, gives the meta-classifier explicit training signal for three label
  families it currently ignores, and unblocks the broader Q5 taxonomy
  gap list that the dataset landscape survey documented.
