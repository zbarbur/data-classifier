goal: "Expand the data_classifier entity vocabulary with three net-new types\
  \ surfaced by the Sprint 10 Gretel-finance ingest discovery sample. These\
  \ labels are present in the 100-row discovery sample of\
  \ gretelai/synthetic_pii_finance_multilingual but were deliberately NOT mapped\
  \ during Sprint 10 ingest because they do not correspond to any entity type in\
  \ the current production vocabulary, and the Sprint 10 ACC explicitly required\
  \ that net-new types be surfaced here rather than silently added to the\
  \ production taxonomy."
complexity: M
technical_specs:
- "Add ACCOUNT_PIN entity type to data_classifier vocabulary. This is the PIN\
  \ used for account authentication (distinct from CREDENTIAL in that it is\
  \ always a short numeric/alphanumeric code, typically 4-8 chars). Nemotron\
  \ maps its raw 'pin' label to CREDENTIAL today; consider whether this sprint\
  \ should retire that CREDENTIAL mapping in favor of a dedicated ACCOUNT_PIN\
  \ class, or keep both."
- "Add BBAN entity type. Basic Bank Account Number is the pre-IBAN country-local\
  \ account format (e.g., ITALY: 12-char alphanumeric; GERMANY: 10-digit). BBAN\
  \ and IBAN are sometimes confused — an IBAN is BBAN + country prefix +\
  \ checksum. Consider whether BBAN merits a dedicated class or should fold\
  \ into BANK_ACCOUNT."
- "Add DRIVER_LICENSE entity type (or DRIVER_LICENSE_NUMBER — pick one). US\
  \ state-specific format varies wildly; international formats are even more\
  \ varied. Presidio ships per-US-state regexes we can reference for pattern\
  \ design."
- "Update tests/benchmarks/corpus_loader.py::GRETEL_FINANCE_TYPE_MAP and\
  \ scripts/download_corpora.py::GRETEL_FINANCE_TYPE_MAP to add the three new\
  \ mappings. Regenerate tests/fixtures/corpora/gretel_finance_sample.json to\
  \ include the new types. Relock the\
  \ _GRETEL_FINANCE_EXPECTED_RAW_LABELS frozenset and raise\
  \ _GRETEL_FINANCE_TARGET_TYPES."
- "Add regex patterns for each new type to data_classifier/profiles/standard.yaml.\
  \ Write patterns from public specification sources (not copied from Presidio\
  \ regex — write from format spec per data_classifier IP policy)."
description: ''
acceptance_criteria:
- Three new entity types added to the production vocabulary with regex patterns,
  validators where applicable, and at least 2 positive / 2 negative examples each
- GRETEL_FINANCE_TYPE_MAP widened to cover the three new types (18 of 27 labels
  covered in the discovery sample, 67% label-vocab coverage — up from Sprint 10's
  55%)
- Gretel-finance fixture regenerated to include ACCOUNT_PIN / BBAN /
  DRIVER_LICENSE records, still < 100KB, still with credential-in-prose context
- No regression on existing corpora F1 after the taxonomy expansion
- Meta-classifier retrain with the new classes exposed to training data
test_plan:
