goal: >
  Expose "the live-path validator chain rejected this credential-shaped
  value" as a new feature on the meta-classifier vector so the shadow
  model learns to emit NEGATIVE instead of CREDENTIAL when the
  validator chain rejects a placeholder / test key.
complexity: M
technical_specs:
- New feature "validator_rejected_credential" at the tail of FEATURE_NAMES (schema v4)
- Feature is boolean (0.0 / 1.0) — 1.0 when any credential-family
  regex hit was rejected by not_placeholder_credential validator
- Populated in tests/benchmarks/meta_classifier/extract_features.py
  by observing validator decisions during engine invocation
- Requires feature_schema_version bump v3 -> v4
- Train v4 model, update metadata.json, ship .pkl
- Update test_meta_classifier_features.py expected dim
description: |
  Sprint 11 Phase 10 shadow A/B revealed the NEGATIVE family as the binding
  constraint on shadow quality (recall 0.478, F1 0.595). Decomposition of
  the 235 missed NEGATIVEs shows 99 rows (42%) went to CREDENTIAL —
  secretbench / gitleaks / detect_secrets placeholder test keys that
  structurally look like real credentials but are documentation examples.

  The live-path not_placeholder_credential validator (Phase 6) rejects
  these correctly. But the meta-classifier cannot see validator decisions
  — it only sees the feature vector computed from raw engine output. Adding
  a boolean feature "was this credential finding rejected by the
  not_placeholder_credential validator?" gives the model a direct signal
  to defer to NEGATIVE on placeholder-heavy columns.

  Projected impact: NEGATIVE family recall 0.478 -> ~0.75, reducing shadow
  cross_family_rate from 0.059 to ~0.045. Combined with the has_dictionary_name_match
  item, Sprint 12 target is cross_family_rate < 0.030.
acceptance_criteria:
