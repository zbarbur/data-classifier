notes: "## Verified license details (2026-04-13)\n\nDirect fetch of https://huggingface.co/datasets/ai4privacy/pii-masking-300k/raw/main/LICENSE.md\n\
  confirmed the 300k variant has the same custom AI4Privacy license as the\n400k variant.\
  \ Both files are nearly identical (only difference: 400k cites\npartnerships@ai4privacy.com,\
  \ 300k cites licensing@ai4privacy.com).\n\nVerbatim license clauses:\n\n> \"Access\
  \ to this dataset is granted exclusively for academic research\n> and non-commercial\
  \ purposes, under the stipulation that AI4Privacy is\n> acknowledged in any scholarly\
  \ output that leverages this dataset.\"\n\n> \"To utilize this dataset beyond these\
  \ conditions, including any form\n> of redistribution, uploading to databases, sharing\
  \ through any medium,\n> or the creation and dissemination of derivative works,\
  \ an explicit\n> written license must be obtained from AI4Privacy.\"\n\n> \"Strictly\
  \ no licensing is available directly for companies without\n> prior discussion.\
  \ For commercial use, please contact us at\n> licensing@ai4privacy.com.\"\n\n> \"\
  This dataset is watermarked to ensure compliance with these terms.\n> Unauthorized\
  \ use is traceable, and Ai4Privacy reserves the right to\n> enforce the license\
  \ terms appropriate legal action.\"\n\n## Use-category analysis\n\n| License clause\
  \ | data_classifier's use | Compliant? |\n|---|---|---|\n| Academic + non-commercial\
  \ only | data_classifier targets BigQuery connector (commercial product, dev phase)\
  \ | NO at the use-intent level (intended commercial), but no actual production shipment\
  \ yet |\n| No redistribution | tests/fixtures/corpora/ai4privacy_sample.json (30\
  \ MB) is a public-git redistribution | NO |\n| No derivative works | training_data.jsonl\
  \ + meta_classifier_v1.pkl are derived from ai4privacy rows | NO (clear for jsonl,\
  \ gray for pkl) |\n| Acknowledgement required if academic | We acknowledge in handover\
  \ docs | (would be OK if academic exception applied; doesn't) |\n\n## Why P1 not\
  \ P0 (per user direction 2026-04-13)\n\nNo production exposure has occurred. The\
  \ BQ consumer is still in\ndevelopment \u2014 not deployed to real users. The licensing\
  \ risk is\ninternal-development-state cleanup, not an emergency external\nexposure\
  \ incident. Treat as \"next sprint cleanup\" not \"stop the line.\"\n\n## Sprint\
  \ targeting (2026-04-13)\n\nUser confirmed at planning time: queue this as a Sprint\
  \ 9 candidate.\nSprint 8 is in closing phases \u2014 do NOT execute mid-sprint.\
  \ Pull this\ninto Sprint 9 alongside the Gretel-EN ingestion item and the GLiNER\n\
  tuning ship. Likely Sprint 9 sequence:\n  1. ingest-gretel-pii-masking-en-v1 (replacement\
  \ corpus lands first)\n  2. drop-ai4privacy (this item \u2014 file removal + retraining\
  \ once\n     Gretel-EN is wired in, OR Phase 2 option A: retrain on 5\n     corpora\
  \ without waiting for Gretel-EN)\n  3. promote-gliner-tuning-fastino-base-v1 (GLiNER\
  \ config swap)\n\n## Phase 2 retraining decision \u2014 defer to Sprint 9 planning\n\
  \nTwo options for the meta-classifier retraining sub-task; pick at\nSprint 9 planning:\n\
  \nOption A \u2014 drop now, retrain on 5 remaining corpora (gitleaks,\n  secretbench,\
  \ detect_secrets, nemotron, synthetic). Faster, fully\n  ai4privacy-free in one\
  \ sprint, may produce a small F1 regression\n  because we lose ~1200 PII rows. Acceptable\
  \ because the meta-\n  classifier is shadow-only.\n\nOption B \u2014 wait for Gretel-EN\
  \ to be ingested first, then retrain on\n  the 6-corpus set (gitleaks, secretbench,\
  \ detect_secrets, nemotron,\n  synthetic, gretel-en). Same row count as before,\
  \ mixed-label\n  diversity improvement, no expected F1 regression. Requires the\n\
  \  Gretel-EN ingestion item (ingest-gretel-pii-masking-en-v1) to land\n  first within\
  \ the same sprint.\n\nRecommended: Option B if Gretel-EN ingestion fits in Sprint\
  \ 9 capacity,\nOption A as the fallback if it doesn't.\n\n## Exposure inventory\n\
  \n### Git-committed (public repo)\n1. tests/fixtures/corpora/ai4privacy_sample.json\
  \ \u2014 30 MB, since Sprint 4\n2. tests/benchmarks/meta_classifier/training_data.jsonl\
  \ \u2014 2 MB, since Sprint 6 Phase 2\n\n### Shipped in the wheel (production code\
  \ path)\n3. data_classifier/models/meta_classifier_v1.pkl \u2014 gray-zone derivative,\n\
  \   LogReg coefficients trained on ai4privacy + other corpora rows\n4. data_classifier/models/meta_classifier_v1.eval.json\
  \ + .metadata.json \u2014\n   derived metrics over ai4privacy held-out splits\n\n\
  ### Not derivative (safe to keep)\n- scripts/download_corpora.py \u2014 code that\
  \ fetches the data\n- tests/benchmarks/corpus_loader.py \u2014 code that processes\
  \ the data\n- docs/sprints/*.md, backlog/*.yaml \u2014 text mentions, aggregate\
  \ metrics\n\n### Wheel containment check (good news)\npyproject.toml [tool.setuptools.packages.find]\
  \ includes only\n`data_classifier*`, so the tests/ directory does NOT ship in the\
  \ wheel.\nThe 30 MB fixture is NOT in the production wheel \u2014 only in the public\n\
  git repo.\n\n## Replacement corpus\n\nPer docs/experiments/meta_classifier/dataset_landscape.md\
  \ Tier 1 #1:\ngretelai/gretel-pii-masking-en-v1 (Apache 2.0, 60k rows, 47 domains,\n\
  mixed-label including credentials + PII + financial + health). This is\na strict\
  \ superset of what we used ai4privacy for (PII labels at scale)\nAND it directly\
  \ attacks the credential-corpus bias problem documented\nin Q3/Q5/Q6/E10. This is\
  \ a compliance fix that ALSO improves the\nmeta-classifier's structural problem.\n\
  \n## Open question for the user \u2014 historical commit cleanup\n\nThe 30 MB ai4privacy\
  \ fixture exists in the git history since commit\n68ff8ec (Sprint 4). Removing it\
  \ from the current state stops new\nexposure but does not remove it from history.\
  \ Two options:\n\n- (A) Conservative: remove from current state, .gitignore it,\
  \ leave\n  history alone. Historical commits still contain the file but it\n  stops\
  \ being \"live\" content.\n- (B) Aggressive: rewrite history with `git filter-repo`\
  \ to remove\n  the file from every historical commit. This rewrites every commit\n\
  \  hash since Sprint 4 and breaks every clone, fork, and downstream\n  reference.\
  \ Disruptive but legally cleaner.\n\nRecommend (A) for now because the data_classifier\
  \ repo is small,\nthe BQ consumer is still in dev, and there's no evidence of external\n\
  forks or clones with the historical fixture in them. Revisit (B) if\nexternal exposure\
  \ becomes an issue.\n\n## Dependencies\n\nDepends on (must land first or land together):\n\
  - ingest-gretel-pii-masking-en-v1 \u2014 provides the replacement corpus\n\nBlocks:\n\
  - Any new release of data_classifier that ships meta_classifier_v1.pkl\n- Any benchmark\
  \ publication or external doc that cites Ai4Privacy 0.667\n"
