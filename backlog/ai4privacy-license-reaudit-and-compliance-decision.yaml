goal: "Remove ai4privacy/pii-masking-300k from data_classifier's training and\nbenchmark\
  \ pipeline because its license has been verified as a custom\nnon-OSI license that\
  \ prohibits commercial use, redistribution, and\nderivative works without explicit\
  \ written permission. Replace with\nGretel-EN (Apache 2.0, mixed-label, larger row\
  \ count) per the\ndataset_landscape.md Tier 1 #1 recommendation. Re-baseline the\
  \ headline\nblind macro F1 number against the new corpus, retrain the meta-classifier\n\
  pkl from the new training data, remove the committed derivative\nartifacts from\
  \ the repo. No production exposure has occurred \u2014 the BQ\nconsumer is still\
  \ in development \u2014 so this is internal-state cleanup,\nnot an emergency hotfix.\n"
