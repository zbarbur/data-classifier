goal: |
  Remove ai4privacy/pii-masking-300k from data_classifier's training and
  benchmark pipeline because its license has been verified as a custom
  non-OSI license that prohibits commercial use, redistribution, and
  derivative works without explicit written permission. Replace with
  Gretel-EN (Apache 2.0, mixed-label, larger row count) per the
  dataset_landscape.md Tier 1 #1 recommendation. Re-baseline the headline
  blind macro F1 number against the new corpus, retrain the meta-classifier
  pkl from the new training data, remove the committed derivative
  artifacts from the repo. No production exposure has occurred — the BQ
  consumer is still in development — so this is internal-state cleanup,
  not an emergency hotfix.
