notes: |
  ## Verified license details (2026-04-13)

  Direct fetch of https://huggingface.co/datasets/ai4privacy/pii-masking-300k/raw/main/LICENSE.md
  confirmed the 300k variant has the same custom AI4Privacy license as the
  400k variant. Both files are nearly identical (only difference: 400k cites
  partnerships@ai4privacy.com, 300k cites licensing@ai4privacy.com).

  Verbatim license clauses:

  > "Access to this dataset is granted exclusively for academic research
  > and non-commercial purposes, under the stipulation that AI4Privacy is
  > acknowledged in any scholarly output that leverages this dataset."

  > "To utilize this dataset beyond these conditions, including any form
  > of redistribution, uploading to databases, sharing through any medium,
  > or the creation and dissemination of derivative works, an explicit
  > written license must be obtained from AI4Privacy."

  > "Strictly no licensing is available directly for companies without
  > prior discussion. For commercial use, please contact us at
  > licensing@ai4privacy.com."

  > "This dataset is watermarked to ensure compliance with these terms.
  > Unauthorized use is traceable, and Ai4Privacy reserves the right to
  > enforce the license terms appropriate legal action."

  ## Use-category analysis

  | License clause | data_classifier's use | Compliant? |
  |---|---|---|
  | Academic + non-commercial only | data_classifier targets BigQuery connector (commercial product, dev phase) | NO at the use-intent level (intended commercial), but no actual production shipment yet |
  | No redistribution | tests/fixtures/corpora/ai4privacy_sample.json (30 MB) is a public-git redistribution | NO |
  | No derivative works | training_data.jsonl + meta_classifier_v1.pkl are derived from ai4privacy rows | NO (clear for jsonl, gray for pkl) |
  | Acknowledgement required if academic | We acknowledge in handover docs | (would be OK if academic exception applied; doesn't) |

  ## Why P1 not P0 (per user direction 2026-04-13)

  No production exposure has occurred. The BQ consumer is still in
  development — not deployed to real users. The licensing risk is
  internal-development-state cleanup, not an emergency external
  exposure incident. Treat as "next sprint cleanup" not "stop the line."

  ## Sprint targeting (2026-04-13)

  User confirmed at planning time: queue this as a Sprint 9 candidate.
  Sprint 8 is in closing phases — do NOT execute mid-sprint. Pull this
  into Sprint 9 alongside the Gretel-EN ingestion item and the GLiNER
  tuning ship. Likely Sprint 9 sequence:
    1. ingest-gretel-pii-masking-en-v1 (replacement corpus lands first)
    2. drop-ai4privacy (this item — file removal + retraining once
       Gretel-EN is wired in, OR Phase 2 option A: retrain on 5
       corpora without waiting for Gretel-EN)
    3. promote-gliner-tuning-fastino-base-v1 (GLiNER config swap)

  ## Phase 2 retraining decision — defer to Sprint 9 planning

  Two options for the meta-classifier retraining sub-task; pick at
  Sprint 9 planning:

  Option A — drop now, retrain on 5 remaining corpora (gitleaks,
    secretbench, detect_secrets, nemotron, synthetic). Faster, fully
    ai4privacy-free in one sprint, may produce a small F1 regression
    because we lose ~1200 PII rows. Acceptable because the meta-
    classifier is shadow-only.

  Option B — wait for Gretel-EN to be ingested first, then retrain on
    the 6-corpus set (gitleaks, secretbench, detect_secrets, nemotron,
    synthetic, gretel-en). Same row count as before, mixed-label
    diversity improvement, no expected F1 regression. Requires the
    Gretel-EN ingestion item (ingest-gretel-pii-masking-en-v1) to land
    first within the same sprint.

  Recommended: Option B if Gretel-EN ingestion fits in Sprint 9 capacity,
  Option A as the fallback if it doesn't.

  ## Exposure inventory

  ### Git-committed (public repo)
  1. tests/fixtures/corpora/ai4privacy_sample.json — 30 MB, since Sprint 4
  2. tests/benchmarks/meta_classifier/training_data.jsonl — 2 MB, since Sprint 6 Phase 2

  ### Shipped in the wheel (production code path)
  3. data_classifier/models/meta_classifier_v1.pkl — gray-zone derivative,
     LogReg coefficients trained on ai4privacy + other corpora rows
  4. data_classifier/models/meta_classifier_v1.eval.json + .metadata.json —
     derived metrics over ai4privacy held-out splits

  ### Not derivative (safe to keep)
  - scripts/download_corpora.py — code that fetches the data
  - tests/benchmarks/corpus_loader.py — code that processes the data
  - docs/sprints/*.md, backlog/*.yaml — text mentions, aggregate metrics

  ### Wheel containment check (good news)
  pyproject.toml [tool.setuptools.packages.find] includes only
  `data_classifier*`, so the tests/ directory does NOT ship in the wheel.
  The 30 MB fixture is NOT in the production wheel — only in the public
  git repo.

  ## Replacement corpus

  Per docs/experiments/meta_classifier/dataset_landscape.md Tier 1 #1:
  gretelai/gretel-pii-masking-en-v1 (Apache 2.0, 60k rows, 47 domains,
  mixed-label including credentials + PII + financial + health). This is
  a strict superset of what we used ai4privacy for (PII labels at scale)
  AND it directly attacks the credential-corpus bias problem documented
  in Q3/Q5/Q6/E10. This is a compliance fix that ALSO improves the
  meta-classifier's structural problem.

  ## Open question for the user — historical commit cleanup

  The 30 MB ai4privacy fixture exists in the git history since commit
  68ff8ec (Sprint 4). Removing it from the current state stops new
  exposure but does not remove it from history. Two options:

  - (A) Conservative: remove from current state, .gitignore it, leave
    history alone. Historical commits still contain the file but it
    stops being "live" content.
  - (B) Aggressive: rewrite history with `git filter-repo` to remove
    the file from every historical commit. This rewrites every commit
    hash since Sprint 4 and breaks every clone, fork, and downstream
    reference. Disruptive but legally cleaner.

  Recommend (A) for now because the data_classifier repo is small,
  the BQ consumer is still in dev, and there's no evidence of external
  forks or clones with the historical fixture in them. Revisit (B) if
  external exposure becomes an issue.

  ## Dependencies

  Depends on (must land first or land together):
  - ingest-gretel-pii-masking-en-v1 — provides the replacement corpus

  Blocks:
  - Any new release of data_classifier that ships meta_classifier_v1.pkl
  - Any benchmark publication or external doc that cites Ai4Privacy 0.667
