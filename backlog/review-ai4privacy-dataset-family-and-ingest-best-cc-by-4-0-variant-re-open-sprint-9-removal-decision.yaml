notes: "Re-tagged for Sprint 12 and re-prioritized P2 \u2192 P1 on 2026-04-15 at\n\
  /sprint-start 12. The original item was filed at Sprint 11 close as a\ngeneral \"\
  review the family and pick a variant\" exploration; the Sprint 12\nreframe makes\
  \ openpii-1m specifically a critical-path prerequisite for\nthe directive flip,\
  \ so the scope is now a directed ingest, not a survey.\n\nThe other ai4privacy variants\
  \ (300k, 400k, pii-masking-2m) are explicitly\nout of scope. If any of them looks\
  \ attractive after Sprint 12 closes,\nfile a separate Sprint 13+ item.\n\nKey risk:\
  \ ai4privacy openpii-1m has labels (IDCARDNUM, DRIVERLICENSENUM,\nTAXNUM, PASSPORTNUM)\
  \ that don't have clean 1:1 mappings in the current\ntaxonomy. The mapping decisions\
  \ need to happen during the type-map\nauthoring step and may surface new entity\
  \ types that need to be added to\nstandard.yaml + the family taxonomy. If new entity\
  \ types are added,\nthey must be classified into one of the 13 existing families\n\
  (CONTACT, FINANCIAL, GOVERNMENT_ID, etc.) and the cross_family_rate\nmetric on the\
  \ canonical family benchmark must not regress as a result.\n"
