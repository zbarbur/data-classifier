description: 'Sprint 9 removed ai4privacy/pii-masking-300k based on the presumption
  that

  all ai4privacy datasets share the non-OSI custom license that pii-masking-400k

  has. That presumption is wrong: ai4privacy/pii-masking-openpii-1m is

  explicitly CC-BY-4.0 (commercial use permitted, attribution required),

  confirmed 2026-04-14 via direct HuggingFace page fetch.


  The dataset is 1,428,143 rows, 4.61GB JSONL, 23 languages, 19 entity

  labels including high-value PII (IDCARDNUM, DRIVERLICENSENUM, TAXNUM,

  PASSPORTNUM, SOCIALNUM, CREDITCARDNUMBER) that our current taxonomy

  covers partially.


  Sprint 12 reframe places this item on the critical path for the v3

  directive flip: the meta-classifier retrain that produces the v4 (or v5)

  artifact for the directive promotion needs the new training data alongside

  the validator_rejected_credential and has_dictionary_name_match features.

  Without this corpus, the retrain runs on the same data as v3 and any

  family-metric improvements are bounded by the existing training set.


  Variant decision (2026-04-15): user chose openpii-1m specifically. The

  other variants (300k, 400k, pii-masking-2m) are out of scope. The

  pii-masking-2m variant has 82+ labels and 24 languages but its license

  has not been independently verified, and the additional taxonomy work

  would not fit Sprint 12''s critical-path budget.


  Order-of-operations: this item runs in parallel with the

  validator_rejected_credential and has_dictionary_name_match feature items

  in the first half of Sprint 12. All three must complete before the v3

  retrain step in sprint12-shadow-directive-promotion-gate.


  Risk: 4.61GB download. The corpus is too large to commit and must be

  fetched at training time. Loader needs to handle the missing-file case

  gracefully (skip with clear error message) so CI without the corpus does

  not break. Pattern is already established by Gretel-EN / Gretel-finance.

  '
