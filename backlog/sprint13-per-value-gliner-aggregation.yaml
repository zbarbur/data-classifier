goal: 'Refactor GLiNERInferenceEngine to support per-value span extraction in addition
  to the current column-level single-label mode, and implement column-level aggregation:
  for each entity type seen in any sample value, emit a ClassificationFinding at confidence
  proportional to per-value coverage. This is the handler for the free_text_heterogeneous
  branch from Item A (column-shape router) and is what actually delivers multi-label
  output on log-shaped columns.

  '
complexity: M
technical_specs:
- 'GLiNER per-value mode: refactor data_classifier/engines/gliner_engine.py (or wherever
  the inference wrapper lives) to accept a "per_value" argument that runs the ONNX
  span-extraction model on EACH sample value individually and returns a list[list[SpanDetection]]
  where the outer list is per-sample and the inner list is per-span. Current mode
  concatenates sample values and runs once; per-value mode runs N times for N sample
  values.'
- 'Column-level aggregation: new helper ``aggregate_per_value_spans( per_value_spans:
  list[list[SpanDetection]], n_samples: int) -> list[ClassificationFinding]`` that
  (a) computes per-entity-type coverage (fraction of sample values with at least one
  span of this type), (b) emits one ClassificationFinding per entity type observed
  with confidence = coverage * max_span_confidence. Threshold: drop entity types with
  coverage < 0.1 (arbitrary noise floor, tune in implementation).'
- 'Orchestrator integration (2026-04-17 revised from "replace" to "union"): Item A''s
  free_text_heterogeneous branch calls the per-value GLiNER handler and merges the
  aggregated findings with the existing 7-pass cascade output via the orchestrator''s
  existing authority + suppression passes. Cascade findings (regex floor, 100% precision
  where patterns match) are preserved; GLiNER per-value findings are ADDED on top,
  contributing entity types the regex cascade does not express (ORGANIZATION, free-form
  DOB, prose PERSON_NAME). On duplicate entity_types, the merge uses the higher confidence.
  Rationale: replacing the cascade would sacrifice deterministic regex precision +
  language-agnostic coverage for GLiNER''s English-only, hallucination-prone output.
  Union preserves the regex floor and lets GLiNER add coverage.'
- "Performance budget (Sprint 13 scoping Q2 decision, 2026-04-16): cap per-value inference\
  \ at N=60 sample values, selected deterministically by stable hash (reproducible\
  \ across runs, independent of insertion order). The cap is exposed as ``per_value_gliner_sample_size``\
  \ in engine_defaults.yaml so it can be retuned without a code change after Item\
  \ A telemetry characterizes real-world branch distribution and tail latency. Chao-1\
  \ cardinality estimates are noisy below ~30 samples, so N=60 leaves headroom for\
  \ downstream diversity estimation. No per-column timeout gate: the design is \"\
  measure, do not gate\" \u2014 the goal is to understand the latency characteristic\
  \ before imposing a fallback threshold. Latency is emitted per call via ColumnShapeEvent\
  \ (per_value_inference_ms + sampled_row_count fields, see Item A). Item A's routing\
  \ gate already ensures only free_text_heterogeneous columns pay this cost."
- "Testing (2026-04-17 revised for union design): benchmark against the 6 Q3 fixtures\
  \ from sprint12_safety_audit.py. Union win condition: (a) output entity set is a\
  \ SUPERSET of the pre-Item-B cascade entity set on every fixture (structural assertion,\
  \ true by construction under union), (b) GLiNER contributes \u2265 1 entity type\
  \ not in the cascade set on \u2265 3 of 6 fixtures (real GLiNER lift), AND (c) no\
  \ fixture emits an entity type not plausibly present in the column (precision guard\
  \ against hallucination)."
- 'Fallback: if GLiNER inference fails on a value (OOM, model load error, etc.), fall
  back to that row''s cascade regex output. Never block a column on a per-value GLiNER
  failure.'
description: "Reframed Sprint 13 brief Item B. The original \"train 3 specialized\
  \ stage-2\nclassifiers\" framing assumed we needed a multi-label classifier trained\
  \ on\nmulti-label data (which we don't have). The reframe uses GLiNER, which is\n\
  a span extraction model that already exists in our engine cascade and is\nnaturally\
  \ multi-label at the column level when run per-value + aggregated.\nNo new training\
  \ data required; the tool's capability just needs to be\nunlocked.\n\nCurrently\
  \ GLiNER is used as a column-level single-label classifier\n(concatenate sample\
  \ values, run once, take top label). This throws away\nthe per-value multi-span\
  \ capability that is exactly what log-shaped\ncolumns need.\n\nEvidence (from sprint12_safety_audit.md\
  \ \xA73): the 6 heterogeneous fixtures\nhave an average of 2\u20134 distinct entity\
  \ types per column that the live\nregex cascade finds. GLiNER per-value should find\
  \ at least that many,\npotentially more (it catches non-regex-matchable entities\
  \ like\norganization names, dates in free form, etc.).\n\nDepends on Item A (column-shape\
  \ router) because the entry point is the\nfree_text_heterogeneous branch. Without\
  \ Item A, we have no gate to decide\nwhen to run per-value GLiNER, and running it\
  \ unconditionally would 50x\nthe inference cost on homogeneous columns for no benefit.\n"
acceptance_criteria:
- GLiNERInferenceEngine supports a per_value mode
- aggregate_per_value_spans helper exists and converts per-value spans to column-level
  list[ClassificationFinding]
- Orchestrator free_text_heterogeneous branch calls per-value handler and merges its
  findings with the cascade output via the existing authority/suppression passes (union
  design, 2026-04-17; cascade regex floor preserved, GLiNER adds coverage)
- "On all 6 Q3 fixtures from sprint12_safety_audit.py, orchestrator output is a SUPERSET\
  \ of the pre-Item-B cascade entity set (structural, true under union by construction\
  \ \u2014 the test asserts it is still observed end-to-end)"
- "GLiNER contributes at least one entity type not in the cascade set on at least\
  \ 3 of 6 Q3 fixtures (demonstrates real GLiNER lift \u2014 e.g. ORGANIZATION, DATE_OF_BIRTH\
  \ in prose, PERSON_NAME in chat)"
- "No Q3 fixture emits an entity type not plausibly present in the column (hallucination\
  \ guard \u2014 operator-level list of plausible entities per fixture is included\
  \ in the fixture metadata)"
- Integration test on tests/benchmarks/meta_classifier/sprint12_safety_audit.py produces
  Q3 aggregate verdict GREEN after this item lands (Item A already lifted it by routing
  away from v5; Item B improves the handler)
- No regression on family benchmark (most family benchmark rows are structured_single,
  not heterogeneous, so unaffected)
- Lint + format clean, full test suite green
- "Per-value inference latency measured per call via Item A's ColumnShapeEvent (per_value_inference_ms\
  \ + sampled_row_count fields populated for the free_text_heterogeneous branch);\
  \ latency distribution across the 6 Q3 fixtures + at least 10 synthetic heterogeneous\
  \ columns characterized in the Sprint 13 handover. No timeout gate in Sprint 13\
  \ \u2014 the decision (Q2, 2026-04-16) is \"measure, do not gate\" before imposing\
  \ a fallback threshold."
- '``per_value_gliner_sample_size`` exposed as a configurable key in engine_defaults.yaml
  (default N=60), so the cap can be retuned without a code change as telemetry from
  Item A accumulates.'
test_plan:
- Unit tests on per-value GLiNER inference against 3+ fixtures with known ground-truth
  spans
- Aggregation tests on mock per-value output with known coverage, assert correct ClassificationFinding
  list
- "Integration test on safety audit Q3 across all 6 fixtures \u2014 shadow output\
  \ should match or exceed live cascade"
- Performance measurement on latency characterization on 50-row columns
- Regression check on full test suite + family benchmark
notes: "Estimated ~1 week of implementation. The biggest unknowns are (a) whether\n\
  GLiNER per-value inference is fast enough to be practical, (b) whether\naggregation\
  \ thresholds need per-entity-type tuning. Both are empirical\nquestions answered\
  \ by running the code on the 6 Q3 fixtures.\n\nFollow-up research (for the research\
  \ branch):\n  1. Does GLiNER generalize to non-English heterogeneous content? Current\n\
  \     model is English-only; Kafka streams and audit logs in international\n   \
  \  deployments have non-English content. May need a multilingual GLiNER\n     variant\
  \ for Sprint 14+.\n  2. Can we use the per-value output to also improve the structured_single\n\
  \     branch? If GLiNER per-value is reliable, it could be a fallback for\n    \
  \ structured columns where the regex cascade misses. Likely Sprint 14+.\n  3. What\
  \ does the aggregation's confidence calibration look like on real\n     BQ heterogeneous\
  \ columns? The coverage * max_confidence formula is a\n     reasonable first pass\
  \ but may need tuning.\n\nONNX runtime note: current GLiNER ONNX export is wired\
  \ through\ndata_classifier.download_models. The per-value mode should work with\
  \ the\nexisting ONNX session without model changes \u2014 just a new inference pattern.\n"
