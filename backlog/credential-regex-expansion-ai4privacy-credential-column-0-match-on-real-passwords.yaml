goal: Lift Ai4Privacy CREDENTIAL column match rate from 0% to >=50% by adding a column-name-gated
  password pattern for short random strings (4-64 chars, >=2 char classes), without
  introducing FPs on content without password column hints.
complexity: S
technical_specs:
- "File: data_classifier/patterns/default_patterns.json \u2014 new 'random_password'\
  \ pattern, entity_type=CREDENTIAL, sensitivity=HIGH, confidence=0.6, context_words_boost=[password,pwd,passphrase,secret_key,auth,login_password,user_password],\
  \ authority set to require column hint boost (TBD mechanism \u2014 possibly content_authority=0\
  \ with column_authority>=5)"
- "File: data_classifier/engines/regex_engine.py \u2014 verify authority floor logic\
  \ suppresses random_password absent column hint (may need a new 'column_gated=true'\
  \ flag on pattern schema)"
- "File: tests/test_credential_password.py (new) \u2014 20+ cases: real Ai4Privacy\
  \ samples with col hint, same samples without col hint (must NOT match), common\
  \ column names (email/name) with password-like values (must NOT match), edge cases\
  \ (1-3 char strings, 100+ char strings)"
description: ''
acceptance_criteria:
- "New 'random_password' pattern in default_patterns.json gated strictly by column_name\
  \ hint (password, pwd, passphrase, secret_key, auth, login_password) \u2014 never\
  \ fires on content alone"
- Regex matches 4-64 char strings with >=2 character classes among {lowercase, uppercase,
  digit, symbol}, tolerating real Ai4Privacy samples like 'r]iD1#8', 'q4R\\\\', 'Be~o}.zq8^1"',
  '2iGk^'
- Ai4Privacy CREDENTIAL column match_ratio >= 0.50 on the 37738-row CREDENTIAL split
  (from current 0%)
- 'Precision guard: zero new findings on non-password columns in test_fp_corpus and
  test_golden_fixtures (aggressively verify FP-free on address/name/email columns)'
- Macro F1 delta <= 0.01 on all 4 consolidated benchmark configs; named-column configs
  may show CREDENTIAL F1 lift, blind must not regress
- Lint clean, all 1009+ existing tests pass
test_plan:
- 'tests/test_credential_password.py: column-gated match (col=password fires), column-gated
  non-match (col=name does NOT fire), character class threshold (all-digit, all-alpha
  rejected), length bounds (3-char rejected, 4-char accepted, 65-char rejected)'
- "pytest tests/ -v \u2014 zero regressions"
- "python3 -m tests.benchmarks.accuracy_benchmark \u2014 CREDENTIAL column match_ratio\
