goal: 'Ship the GLiNER eval session''s recommended config behind gliner_engine.py:
  model swap (urchade/gliner_multi_pii-v1 -> fastino/gliner2-base-v1), threshold raise
  (0.50 -> 0.80), SSN label swap (national identification number -> social security
  number), PERSON_NAME label swap (person -> full name), descriptions disabled. Gated
  on a full-pipeline accuracy_benchmark run showing Ai4Privacy blind macro F1 lift
  >= +0.02 vs current main.'
