notes: "Source: docs/research/GLINER_MODEL_EVALUATION.md on origin/research/gliner-eval\n\
  Eval session result memo, dispatched 2026-04-13.\n\nHeadline: GLiNER-only blind\
  \ Ai4Privacy lift +0.091 (0.5095 -> 0.6000).\nDecision matrix gate (\u22650.05)\
  \ cleared. Verdict: ship config change, do\nNOT proceed to fork 2 (complementary\
  \ NER research).\n\nCRITICAL CAVEAT: The +0.091 is GLiNER-only blind. Full-pipeline\
  \ lift\nwill be smaller (+0.02 to +0.05 expected) because regex already covers\n\
  SSN-shaped values. The full-pipeline confirmation run is the merge\ngate, not the\
  \ GLiNER-only number.\n\nTWO SURPRISES that contradict Sprint 5:\n1. Sprint 5 rejected\
  \ fastino/gliner2-base-v1 as \"lost on PII detection\".\n   The eval shows that\
  \ rejection was a labelling artifact, not a\n   model-capacity issue. With proper\
  \ labels and threshold, fastino\n   dominates urchade on both blind corpora.\n2.\
  \ Sprint 5 said descriptions helped fastino. The eval shows\n   descriptions consistently\
  \ HURT fastino (-0.062 to -0.093). Ship\n   without descriptions.\n\nPER-TYPE WINS\
  \ on Ai4Privacy (this is where the +0.091 comes from):\n- DATE_OF_BIRTH: 0.000 ->\
  \ 0.667 (rescued)\n- EMAIL: 0.500 -> 1.000 (rescued)\n- IP_ADDRESS: 0.000 -> 0.400\
  \ (partial rescue)\n\nPER-TYPE LOSSES on Ai4Privacy (precision regressions, one\
  \ extra FP each):\n- ADDRESS: 1.000 -> 0.667\n- PHONE: 0.667 -> 0.400\n- SSN: 1.000\
  \ -> 0.667\n\nNet: +0.091. The wins are recall rescues outweighing precision losses.\n\
  \nSTATISTICAL NOISE: Each corpus has 7 columns. Noise floor ~0.1 macro F1.\nDifferences\
  \ > 0.05 are signal; smaller is noise.\n\nUNSOLVED: Nemotron SSN column is uncaught\
  \ by both models at every\nthreshold and label tested. If the full-pipeline run\
  \ shows it's also\nregex-blind, that's a candidate trigger for fork 2 (complementary\
  \ NER\nresearch) as a separate follow-up sprint item.\n\nThis item is a Sprint 9\
  \ candidate. Should land BEFORE any further\nmeta-classifier experiments because:\n\
  - It changes the live pipeline's GLiNER output, which affects the\n  meta-classifier's\
  \ input feature distribution\n- E10's \"GLiNER as feature\" findings should be re-validated\
  \ against\n  the tuned GLiNER (though the LOCO-corpus-fingerprint problem is\n \
  \ structural and unlikely to change with a better GLiNER)\n"
