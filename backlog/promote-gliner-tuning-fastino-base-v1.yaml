notes: |
  Source: docs/research/GLINER_MODEL_EVALUATION.md on origin/research/gliner-eval
  Eval session result memo, dispatched 2026-04-13.

  Headline: GLiNER-only blind Ai4Privacy lift +0.091 (0.5095 -> 0.6000).
  Decision matrix gate (≥0.05) cleared. Verdict: ship config change, do
  NOT proceed to fork 2 (complementary NER research).

  CRITICAL CAVEAT: The +0.091 is GLiNER-only blind. Full-pipeline lift
  will be smaller (+0.02 to +0.05 expected) because regex already covers
  SSN-shaped values. The full-pipeline confirmation run is the merge
  gate, not the GLiNER-only number.

  TWO SURPRISES that contradict Sprint 5:
  1. Sprint 5 rejected fastino/gliner2-base-v1 as "lost on PII detection".
     The eval shows that rejection was a labelling artifact, not a
     model-capacity issue. With proper labels and threshold, fastino
     dominates urchade on both blind corpora.
  2. Sprint 5 said descriptions helped fastino. The eval shows
     descriptions consistently HURT fastino (-0.062 to -0.093). Ship
     without descriptions.

  PER-TYPE WINS on Ai4Privacy (this is where the +0.091 comes from):
  - DATE_OF_BIRTH: 0.000 -> 0.667 (rescued)
  - EMAIL: 0.500 -> 1.000 (rescued)
  - IP_ADDRESS: 0.000 -> 0.400 (partial rescue)

  PER-TYPE LOSSES on Ai4Privacy (precision regressions, one extra FP each):
  - ADDRESS: 1.000 -> 0.667
  - PHONE: 0.667 -> 0.400
  - SSN: 1.000 -> 0.667

  Net: +0.091. The wins are recall rescues outweighing precision losses.

  STATISTICAL NOISE: Each corpus has 7 columns. Noise floor ~0.1 macro F1.
  Differences > 0.05 are signal; smaller is noise.

  UNSOLVED: Nemotron SSN column is uncaught by both models at every
  threshold and label tested. If the full-pipeline run shows it's also
  regex-blind, that's a candidate trigger for fork 2 (complementary NER
  research) as a separate follow-up sprint item.

  This item is a Sprint 9 candidate. Should land BEFORE any further
  meta-classifier experiments because:
  - It changes the live pipeline's GLiNER output, which affects the
    meta-classifier's input feature distribution
  - E10's "GLiNER as feature" findings should be re-validated against
    the tuned GLiNER (though the LOCO-corpus-fingerprint problem is
    structural and unlikely to change with a better GLiNER)
