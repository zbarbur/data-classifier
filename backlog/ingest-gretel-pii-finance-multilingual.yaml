notes: "Source: docs/experiments/meta_classifier/dataset_landscape.md, Tier 1 #2.\n\
  \nWHY THIS IS DISTINCT FROM gretel-en: this dataset places credentials in\nREAL-LOOKING\
  \ FINANCIAL DOCUMENT CONTEXTS, not in source code or config\nfiles. The ai4privacy/nemotron/gitleaks/secretbench/detect_secrets\n\
  corpora ALL share the property that credentials appear in short,\nisolated, code-like\
  \ contexts. This dataset is the only one in the open\ndata landscape where credentials\
  \ live inside long-form prose\n(mortgage applications, insurance claims, SWIFT messages).\n\
  \nThe heuristic_avg_length feature has been the dominant corpus-fingerprint\nfeature\
  \ in every meta-classifier experiment (Q3, Q5, Q6, E10) because\ncredential corpora\
  \ produce short avg-length, PII corpora produce long\navg-length. This dataset breaks\
  \ that pattern at the data source: it\ncontains LONG-AVG-LENGTH credentials (because\
  \ they're embedded in prose).\n\nEXPECTED IMPACT: this should be the single most\
  \ effective intervention\non the heuristic_avg_length corpus-leaking problem. If\
  \ the bias-breaking\nhypothesis is correct, after both gretel-en + gretel-finance\
  \ land:\n- heuristic_avg_length should drop in feature importance (currently\n \
  \ rank 1 with |coef|=493)\n- LOCO macro F1 on credential corpora should improve\n\
  - The \"predict CREDENTIAL whenever corpus is gitleaks/secretbench/\n  detect_secrets\"\
  \ shortcut should weaken\n\nQuantify this in the LOCO re-measurement after both\
  \ Gretel corpora land.\n\nETL effort is S (NOT M) because this dataset shares the\
  \ schema with\ngretel-en \u2014 the corpus_loader logic from the gretel-en ingestion\n\
  largely transfers. The new work is the type map and per-language\nhandling.\n\n\
  Multilingual support is a free win: data_classifier currently has no\nnon-English\
  \ training data (all corpora are EN-only). 7 European\nlanguages here add multilingual\
  \ generalization at no extra ETL cost.\n\nLicense: Apache 2.0 verified at dataset\
  \ metadata.\n"
