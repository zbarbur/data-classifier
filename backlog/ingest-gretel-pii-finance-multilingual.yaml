notes: |
  Source: docs/experiments/meta_classifier/dataset_landscape.md, Tier 1 #2.

  WHY THIS IS DISTINCT FROM gretel-en: this dataset places credentials in
  REAL-LOOKING FINANCIAL DOCUMENT CONTEXTS, not in source code or config
  files. The ai4privacy/nemotron/gitleaks/secretbench/detect_secrets
  corpora ALL share the property that credentials appear in short,
  isolated, code-like contexts. This dataset is the only one in the open
  data landscape where credentials live inside long-form prose
  (mortgage applications, insurance claims, SWIFT messages).

  The heuristic_avg_length feature has been the dominant corpus-fingerprint
  feature in every meta-classifier experiment (Q3, Q5, Q6, E10) because
  credential corpora produce short avg-length, PII corpora produce long
  avg-length. This dataset breaks that pattern at the data source: it
  contains LONG-AVG-LENGTH credentials (because they're embedded in prose).

  EXPECTED IMPACT: this should be the single most effective intervention
  on the heuristic_avg_length corpus-leaking problem. If the bias-breaking
  hypothesis is correct, after both gretel-en + gretel-finance land:
  - heuristic_avg_length should drop in feature importance (currently
    rank 1 with |coef|=493)
  - LOCO macro F1 on credential corpora should improve
  - The "predict CREDENTIAL whenever corpus is gitleaks/secretbench/
    detect_secrets" shortcut should weaken

  Quantify this in the LOCO re-measurement after both Gretel corpora land.

  ETL effort is S (NOT M) because this dataset shares the schema with
  gretel-en — the corpus_loader logic from the gretel-en ingestion
  largely transfers. The new work is the type map and per-language
  handling.

  Multilingual support is a free win: data_classifier currently has no
  non-English training data (all corpora are EN-only). 7 European
  languages here add multilingual generalization at no extra ETL cost.

  License: Apache 2.0 verified at dataset metadata.
