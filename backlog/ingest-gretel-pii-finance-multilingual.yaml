goal: "Add gretelai/synthetic_pii_finance_multilingual (Apache 2.0, 56k rows, 7 languages)\
  \ as the 8th training corpus. This is the only open dataset found where API keys,\
  \ passwords, and account_pin are labeled INSIDE real-looking financial paperwork\
  \ contexts (loan agreements, bank statements, tax forms, SWIFT messages, insurance\
  \ claim forms) \u2014 directly attacking the heuristic_avg_length corpus fingerprint\
  \ by placing credentials in long-form prose contexts instead of credential-only\
  \ lines."
