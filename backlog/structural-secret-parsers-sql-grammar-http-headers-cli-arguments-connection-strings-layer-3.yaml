goal: "Add structural parsers that detect secrets embedded in SQL statements, HTTP\
  \ headers, CLI arguments, and connection strings \u2014 secrets that regex alone\
  \ misses because the credential is only identifiable by its structural context"
complexity: M
technical_specs:
- "File: data_classifier/engines/structural_parsers.py \u2014 new module with SqlSecretParser,\
  \ HttpHeaderParser, CliArgumentParser, ConnectionStringParser classes"
- "File: data_classifier/engines/secret_scanner.py \u2014 integrate structural parsers\
  \ as an additional detection layer"
- "File: tests/test_structural_parsers.py \u2014 parameterized test suite per parser"
- Each parser returns ClassificationFinding with source='structural_parser' and the
  specific sub-parser name
description: ''
acceptance_criteria:
- SQL parser detects credentials in CREATE USER, GRANT, SET PASSWORD, connection DSN
  statements
- HTTP header parser detects Authorization Bearer/Basic, API key headers, Cookie session
  tokens
- CLI argument parser detects --password, --token, --api-key flags with values
- Connection string parser detects password= fields in JDBC, ODBC, PostgreSQL, MongoDB
  URIs
- Each parser has at least 5 positive and 3 negative test cases
- Parsers integrate with the opaque-token branch of the column-shape router
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . && ruff format --check .)
test_plan:
- 'tests/test_structural_parsers.py: parameterized positive/negative for each parser
  type'
- 'tests/test_secret_scanner.py: integration tests showing structural parsers fire
  through the scanner pipeline'
- 'Manual: family benchmark to verify no regressions'
