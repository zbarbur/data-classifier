description: 'Lesson learned from Sprint 10: corpus loaders emit label strings that
  silently drift from the production entity vocabulary. Sprint 8''s CREDENTIAL->4-subtype
  split wasn''t backported to Nemotron loader, and Sprint 10 item #4''s new definitive-tier
  API_KEY entries surfaced the drift as an apparent -0.047 blind F1 regression. Add
  a CI lint that loads each corpus loader''s type map / label emission and fails on
  any label not present in data_classifier.entity_types. Covers Nemotron, Gretel-EN,
  Gretel-finance, SecretBench, gitleaks, detect_secrets, synthetic.'
