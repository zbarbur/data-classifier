description: 'Lesson learned from Sprint 10: corpus loaders emit label strings that
  silently drift from the production entity vocabulary. Sprint 8''s CREDENTIAL->4-subtype
  split wasn''t backported to Nemotron loader, and Sprint 10 item #4''s new definitive-tier
  API_KEY entries surfaced the drift as an apparent -0.047 blind F1 regression. Add
  a CI lint that loads each corpus loader''s type map / label emission and fails on
  any label not present in data_classifier.entity_types. Covers Nemotron, Gretel-EN,
  Gretel-finance, SecretBench, gitleaks, detect_secrets, synthetic.'
acceptance_criteria:
- New lint script or pytest test walks all load_*_corpus functions and extracts their
  emitted entity-type vocabulary
- Lint fails when any loader emits a label absent from data_classifier/entity_types.py
- Lint is wired into the project CI command and runs on every PR (via pytest or explicit
  CI step)
- 'All existing Sprint 10 corpus loaders pass the lint (baseline green post-item #1
  refresh)'
- Tests pass, lint clean
test_plan:
- "test_lint_passes_on_current_loaders \u2014 baseline green"
- "test_lint_fails_on_stale_credential_label \u2014 inject a fake loader emitting\
