goal: "Coordination chore: confirm whether the BQ connector currently populates ColumnInput's\
  \ 5 context fields (table_name, dataset, schema_name, data_type, description) when\
  \ calling data_classifier v0.8.0. The library-side schema surface has existed since\
  \ Sprint 3, but Sprint 8 diagnosis revealed that 4 of the 5 fields are read by zero\
  \ engines today \u2014 only table_name is consumed (via column_name_engine._table_context_boost).\
  \ Sprint 9's gliner-data-type-prefilter item activates data_type consumption for\
  \ the first time. If BQ is not populating these fields, Sprint 9 library-side detection\
  \ gains are theoretical until BQ coordinates with the pipeline. No code changes\
  \ in this repo \u2014 this is an async verification + documentation task."
