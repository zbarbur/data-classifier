notes: "AC #5 (Nemotron blind F1 recovery to >= 0.82) REMOVED after execution found\
  \ the Sprint 10 handover's diagnosis was partially wrong. The taxonomy fix is mechanically\
  \ correct, but Nemotron blind F1 does not recover: counts are IDENTICAL pre-fix\
  \ and post-fix (TP=11, FP=5, FN=2, F1 ~0.759). Scanner over-fires API_KEY + EMAIL\
  \ on col_7 (plaintext password / PIN / UUID-ish values) regardless of the loader\
  \ label \u2014 before fix: predicted=API_KEY vs expected=CREDENTIAL; after fix:\
  \ predicted=API_KEY vs expected=OPAQUE_SECRET. Same FP+FN. Filed new P1 bug: secret-scanner-overfires-api-key-email-on-plaintext-password-uuid-values-nemotron-col7."
