description: "Update tests/benchmarks/corpus_loader.py::load_nemotron_corpus to map\
  \ upstream credential/api_key/password labels through the post-Sprint-8 4-subtype\
  \ taxonomy (API_KEY/PRIVATE_KEY/PASSWORD_HASH/OPAQUE_SECRET). Sprint 10 item #4\
  \ (secret-dict +90 net-new) surfaced this drift: Nemotron blind F1 moved 0.821 ->\
  \ 0.774 (-0.047) because new definitive-tier API_KEY dict entries correctly fire\
  \ on col_2 samples but the loader still emits expected=CREDENTIAL, so the benchmark\
  \ scores them as FP. Fix is mechanical; expected post-fix Nemotron blind ~0.82-0.85.\
  \ Audit other loaders (Gretel-EN, SecretBench, gitleaks, detect_secrets) for the\
  \ same drift \u2014 filed as lesson 1 in SPRINT10_HANDOVER.md."
acceptance_criteria:
- "tests/benchmarks/corpus_loader.py::NEMOTRON_TYPE_MAP maps password\u2192OPAQUE_SECRET,\
  \ api_key\u2192API_KEY, pin\u2192OPAQUE_SECRET, identity CREDENTIAL\u2192OPAQUE_SECRET\
  \ (legacy passthrough)"
- "tests/benchmarks/corpus_loader.py::GRETEL_EN_TYPE_MAP maps password\u2192OPAQUE_SECRET,\
  \ api_key\u2192API_KEY"
- "tests/benchmarks/corpus_loader.py::_DETECT_SECRETS_TYPE_MAP refreshed: aws_access_key/slack_token/stripe_key/jwt/github_token\u2192\
  API_KEY, private_key\u2192PRIVATE_KEY, basic_auth/generic_secret/password_in_url\u2192\
  OPAQUE_SECRET"
- Every label emitted by any corpus loader is a valid entity_type defined in data_classifier/profiles/standard.yaml
