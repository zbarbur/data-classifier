- 'New TestLoaderTaxonomyRefresh drift guards pass (baseline for item #3 drift lint)'
- Named-mode Nemotron benchmark does not regress below 0.92 (non-regression check)
- Gretel-EN blind benchmark does not regress below 0.60 (non-regression check)
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . --exclude .claude/worktrees && ruff format --check . --exclude
