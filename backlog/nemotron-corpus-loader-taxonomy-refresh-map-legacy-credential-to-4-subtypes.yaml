goal: Map every corpus loader's stale CREDENTIAL label through the post-Sprint-8 4-subtype
  taxonomy (API_KEY / PRIVATE_KEY / PASSWORD_HASH / OPAQUE_SECRET) so correct secret-scanner
  findings stop scoring as FPs against the non-existent CREDENTIAL supertype. Scope
  EXPANDED from Nemotron-only to include Gretel-EN and the shared _DETECT_SECRETS_TYPE_MAP
  after audit found identical drift in all three loaders (Sprint 10 lesson 1 audit
  surface).
complexity: S
