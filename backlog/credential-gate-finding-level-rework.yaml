title: "Credential gate (F2): re-spec as finding-level suppressor, not shard-level"
status: backlog
priority: P2
category: cascade
sprint_target: 14
created: 2026-04-17
updated: 2026-04-17
depends_on:
- cascade-suppress-short-circuit-on-heterogeneous-shape
- benchmark-emit-all-cascade-findings-multi-label
tags:
- sprint14
- cascade
- precision
- negative-suppression
- multi-label
goal: >
  F2 as originally specified (shard-level suppressor with rules R2
  config-literal + R3 placeholder) looked GREEN under single-label
  scoring (49% FP supp, 0.3% TP loss). Under multi-label-correct scoring
  it shifts to 93% FP supp but 6.6% TP loss — 57 real credentials on
  mixed-entity columns get wrongly killed along with the noise. Re-spec
  F2 to operate at the FINDING level: drop individual findings whose
  matched value is structurally a placeholder/config-literal, but keep
  the other credential findings in the same column. Ship the revised
  design, not the original.
complexity: M
technical_specs:
- "Current F2 spec (research-archived, do NOT ship):
    rule R2: if ≥30% of shard values match config-literal pattern,
             suppress the entire column's CREDENTIAL prediction
    rule R3: if ≥15% of shard values match placeholder pattern,
             suppress the entire column's CREDENTIAL prediction"
- "Revised F2 spec (ship this):
    For each CREDENTIAL-family finding in a column:
      if the finding's matched value matches R2 (config-literal) OR
         R3 (placeholder) patterns, drop this specific finding
      other findings in the column are unaffected
  This preserves true credential findings on mixed columns while still
  suppressing noise-pattern matches."
- "Patterns (unchanged from original F2):
    PLACEHOLDER_X = re.compile(r'[xX*]{4,}|#{4,}|~{4,}')
    BRACKET_PH    = re.compile(r'\\[(?:PASSWORD|IP|TOKEN|KEY|SECRET|'
                               r'REDACTED|EXAMPLE|REPLACE|YOUR|USER|HOST)\\]'
                               r'|<[A-Z_]{3,}>', re.I)
    CONFIG_LITERAL = re.compile(
        r'=\\s*(?:\\d+|true|false|null|None|INFO|DEBUG|WARN|ERROR|'
        r'OFF|ON|\"[\\d\\s\\w]{1,15}\")\\s*[;,]*\\s*$', re.I)"
- "Apply ONLY to findings where family=CREDENTIAL (scoped narrow; don't
  suppress URL/EMAIL findings even if their matched value looks
  placeholder-y)."
- "Implementation point: new module orchestrator/credential_gate.py,
  called in the cascade after all engines fire, before aggregation.
  Signature: filter_credential_noise(findings) -> filtered_findings."
description: |
  Surfaced 2026-04-17 by the multi-label rescore on
  research/meta-classifier. Full context at
  docs/research/meta_classifier/binary_pii_gate_evaluation_memo.md
  and the rescored F2 numbers at
  docs/experiments/meta_classifier/runs/20260417-multilabel-rescore/
  f2_gate_rescored.json.

  Shard-level F2 is too aggressive on mixed-entity columns. Example:
  a gitleaks shard containing both a real meraki_token credential and
  several `SUMO_ACCESS_KEY=xxxxxxxxxxxx` placeholder values. Shard-level
  R3 suppresses the whole column (placeholder density ≥15%), killing the
  real credential detection. Finding-level R3 drops only the
  OPAQUE_SECRET finding that matched the xxxxxx value while keeping the
  meraki_token finding intact.

  Depends on the cascade short-circuit fix landing first — otherwise
  per-value regex findings don't exist to filter. Depends on multi-label
  scoring landing before the ship-decision can be re-measured honestly.

acceptance_criteria:
- New module orchestrator/credential_gate.py with
  filter_credential_noise() function
- Cascade wiring: gate applied after engine fire, before
  ColumnPrediction aggregation
- Unit tests: placeholder value produces no CREDENTIAL finding;
  real credential + placeholder value in same column keeps the real
  finding
- Under multi-label scoring:
    FP suppression ≥ 85%  (was 93.8% at shard level)
    TP loss ≤ 1.0%         (was 6.60% at shard level — the big win)
- Regression: 707 CREDENTIAL TPs from Sprint 13 benchmark retained
  (≤7 lost, i.e. ≤1%)
test_plan:
- "Unit: placeholder value like 'SUMO_ACCESS_KEY=xxxxxxxxxx' produces
  no CREDENTIAL finding"
- "Unit: real credential value like 'meraki_token = 5cb4a5f0...' produces
  a CREDENTIAL finding"
- "Unit: column with both types produces ONE CREDENTIAL finding (for
  the real value), not zero, not two"
- "Integration: multi-label scored family benchmark — CREDENTIAL precision
  ≥ 0.94 (up from rescored 0.918), TP count drops by ≤7 from 894"
- "Regression: secretbench v2 CREDENTIAL support (≈572) retained at ≥99%"
notes: |
  Effort: M (~2-3 days). The module itself is small; the work is in the
  test matrix and the multi-label benchmark validation.

  Ship-decision gate: wait until the two dependencies are in main
  (short-circuit fix + multi-label scoring). F2 without those is a
  measurement artifact on top of a measurement artifact.

  Research-archive: the shard-level F2 spec lives in the memo at
  docs/research/meta_classifier/binary_pii_gate_evaluation_memo.md
  Finding 2. It looked good under a flawed baseline; the research
  record should not be deleted, just superseded.
