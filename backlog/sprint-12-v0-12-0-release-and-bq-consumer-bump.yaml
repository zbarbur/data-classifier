technical_specs:
- 'Pre-condition: sprint12-shadow-directive-promotion-gate has landed and the directive
  A/B passed the family benchmark ship gates'
- "File: pyproject.toml \u2014 bump version 0.8.0 \u2192 0.12.0 (skipping intermediate\
  \ sprints' unreleased numbers per the Sprint 12 reframe decision)"
- "File: CHANGELOG.md \u2014 write the v0.12.0 entry covering all Sprint 9 / 10 /\
  \ 11 / 12 user-visible changes: family taxonomy on ClassificationFinding, new patterns\
  \ from Sprints 9-10 (Gretel-EN ingest, secret-dict 88\u2192178, Chao-1 cardinality),\
  \ v3 directive promotion, ai4privacy openpii-1m corpus, etc. Reference the relevant\
  \ sprint handover docs."
- "File: docs/CLIENT_INTEGRATION_GUIDE.md \u2014 add v0.12.0 entry to the migration\
  \ section. Document the directive v3 behavior change for connector teams: the orchestrator\
  \ now uses v3 as the source of truth for subtype ranking, no env flag required,\
  \ no opt-in."
- 'Build: run the standard build pipeline to produce the wheel; verify it imports
  cleanly with DATA_CLASSIFIER_DISABLE_ML=0 and =1'
- 'Publish: push the wheel to the AR Python repo (Sprint 8 established this as the
