goal: "Cut v0.12.0, publish to the AR Python repo, and coordinate the BQ connector\
  \ consumer bump from v0.8.0 \u2192 v0.12.0. v0.12.0 is the first BQ release since\
  \ v0.8.0 and contains everything from Sprints 9, 10, 11 (regex + validator + secret-dict\
  \ + family taxonomy) plus the Sprint 12 v3-as-default decision change. One coordinated\
  \ BQ bump, not two \u2014 Sprint 11 deliberately did not cut v0.11.0."
