description: "The secret scanner is hardwired to KV parsing as the only entry point\
  \ for detection. This misses three entire classes of secrets that don't have key=value\
  \ structure:\n\n1. Column-name path \u2014 column name scores as the key (e.g. column\
  \ api_token with bare high-entropy values). The key-name dictionary and tiered scoring\
  \ already exist but are never applied to column names.\n\n2. Prefix path \u2014\
  \ bare values with known secret prefixes (ghp_, AKIA, eyJ, etc.) pass the fast-path\
  \ gate but produce no finding because parse_key_values returns nothing without KV\
  \ structure. The prefix signal is wasted.\n\n3. Statistical path \u2014 blind columns\
  \ with no name hint and no prefix, but population-level characteristics (high entropy,\
  \ consistent length, high char-class diversity, not natural language) strongly suggest\
  \ secrets or hashes.\n\n4. Entropy/heuristic standalone \u2014 even individual values\
  \ with extreme entropy and diversity should be flagged as suspicious, regardless\
  \ of column name or prefix.\n\nAll four paths share downstream logic: placeholder\
  \ suppression, entropy gating, tiered scoring. They differ only in how the candidate\
  \ is identified. Root cause: the fast-path gate and KV parser were accidentally\
  \ made the sole gatekeeper.\n\nBrowser parity note: paths 1 and 3-4 are Python-only\
  \ (column context). Path 2 (prefix detection) applies to both Python and browser\
  \ \u2014 the browser also drops bare prefixed tokens. The JS scanner-core.js secretScannerPass\
  \ has the same KV-only bottleneck."
