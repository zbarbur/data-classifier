technical_specs:
- 'Pre-condition: sprint12-v0.12.0-wheel-release has landed (wheel available in AR
  Python repo).'
- "File the BQ consumer bump as a coordinated PR on the BigQuery-connector side (do\
  \ NOT touch ../BigQuery-connector/ directly \u2014 coordinate via the connector\
  \ team)."
- 'Surface the CLIENT_INTEGRATION_GUIDE.md v0.12.0 migration section to the BQ team
  explicitly. Key points: NO behavior change on live path; ClassificationFinding.family
  is a new additive field (connectors can ignore or surface it in their downstream
  telemetry); shadow meta-classifier observability is accessible via ClassificationEvent.meta_classification
  for DLP policy telemetry.'
