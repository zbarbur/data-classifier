notes: 'Filed 2026-04-16 as the external-coordination half of the retired

  sprint-12-v0-12-0-release-and-bq-consumer-bump composite item. Split

  because wheel-publish (Sprint 12 scope, ~2h of writing) and BQ

  consumer-bump (external team, ~1 day of their capacity) are distinct

  actions blocking on different parties.


  Deferred out of Sprint 13 scope (2026-04-16 scoping discussion): the BQ

  team will pick up the v0.12.0 bump on their own cadence. data_classifier

  v0.12.0 is published and available; no further action required from the

  library side until BQ files their consumer-bump PR. Retagged sprint14 as

  a tracking placeholder; may not actually execute in Sprint 14 either if

  BQ completes the bump on their own timeline first.


  The risk surface is much smaller than the original composite item

  anticipated: v0.12.0 is a shadow-only release from the consumer

  perspective, not a directive flip. The live classification path is

  functionally identical to v0.8.0 on structured single-entity columns

  (Sprint 8 test distribution). The only consumer-visible additive

  change is ClassificationFinding.family, which connectors can ignore

  without breaking their existing integrations.

  '
