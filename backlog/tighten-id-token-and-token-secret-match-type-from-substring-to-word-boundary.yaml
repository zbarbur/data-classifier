goal: Tighten the match_type for id_token and token_secret dictionary entries from
  substring to word_boundary to stop over-firing on compound identifiers that legitimately
  contain the substring.
complexity: S
technical_specs:
- "File: data_classifier/patterns/secret_key_names.json \u2014 update 2 entries from\
  \ substring to word_boundary"
- "File: tests/test_secret_scanner.py \u2014 new TestMatchTypeTightening class with\
  \ positive + negative cases for each entry"
description: 'Sprint 10 code review flagged: id_token (line ~1294 of secret_key_names.json)
  and token_secret currently use match_type=substring at tier=definitive score=0.9
  for subtype=API_KEY. Because the substring match uses Python ''in'' with no word
  boundary (secret_scanner.py:323), they fire definitive API_KEY findings on grid_token,
  paid_token, hybrid_token, uid_token in embedded KV parsers. Fix: change both entries
  from match_type=''substring'' to match_type=''word_boundary'' in scripts/ingest_credential_patterns.py
  CURATED_ENTRIES, then re-run ''python3 scripts/ingest_credential_patterns.py'' (idempotent,
  regenerates JSON + CREDENTIAL_PATTERN_SOURCES.md). word_boundary preserves oauth_id_token
  / oidc_id_token / authentication_token_secret hits while killing the generic-prefix
  false matches. ~1 hour work, no test changes needed (existing TestNewDictionaryEntries
  uses >= on tier_rank). Review source: Sprint 10 code-reviewer pass 2026-04-14, M1
  finding.'
acceptance_criteria:
- secret_key_names.json entries for id_token and token_secret use match_type=word_boundary
- Existing test_secret_scanner.py corpus stays fully green (no regression on the 178-entry
  dict)
- 'New regression tests: ''my_identifier_token'' column name does NOT match id_token;
  ''some_token_secretarial'' does NOT match token_secret'
- 'New regression tests: legitimate ''id_token'' and ''token_secret'' columns still
  match'
- Tests pass, lint clean
test_plan:
