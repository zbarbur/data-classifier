title: "GLiNER2 over-fires ORGANIZATION on numeric-dash inputs (SSN-format) \u2014\
  \ audit prompt/descriptions or add content-shape filter"
status: doing
priority: P2
category: bug
sprint_target: 9
created: 2026-04-13
updated: 2026-04-13
depends_on: []
tags: []
goal: 'Audit and fix the GLiNER2 false-positive where the model returns ORGANIZATION
  at ~0.74 confidence on pure numeric dash-formatted inputs (e.g. ''123-45-6789'',
  ''987-65-4321'') under a generic column name like ''data_field''. Root cause discovered
  during Sprint 8 Item 2 diagnosis: GLiNER2 treats these values as company/org identifiers
  because the description prompt for ORGANIZATION is too loose. Investigate whether
  tightening the ORGANIZATION description, adding a content-shape pre-filter (reject
  inputs matching known PII regex shapes), or fine-tuning the confidence threshold
  fixes this without regressing real ORGANIZATION detection on genuine company names.'
complexity: M
technical_specs:
- "File: data_classifier/engines/gliner_engine.py \u2014 ENTITY_LABEL_DESCRIPTIONS[ORGANIZATION]\
  \ currently says 'Company names, institutions, agencies, or other organizational\
  \ entities'. Consider tightening to exclude numeric codes."
- 'Possible fix: add a pre-filter in _run_ner_on_samples that skips chunks where >=N%
  of values match a PII-shape regex (SSN, phone, credit card), since GLiNER2 is not
  tuned to disambiguate these.'
- 'Benchmark: before/after on Ai4Privacy PERSON_NAME corpus + a new synthetic corpus
  of numeric-dash inputs; must not regress real ORGANIZATION detection by more than
  1 point F1.'
description: ''
acceptance_criteria:
- GLiNER2 returns either no ORGANIZATION finding or a finding at confidence below
  the regex SSN confidence on the canonical test input ['123-45-6789', '987-65-4321',
  'hello world'] under column_name='data_field'
- Real ORGANIZATION F1 on Ai4Privacy benchmark does not regress by more than 1 point
- The TestApplyFindingsLimit regression tests added in Sprint 8 Item 2 continue to
  pass (they pin the gap-suppression mechanism, not GLiNER2's specific behavior)
- A new benchmark report compares GLiNER2 behavior on numeric-PII-shape inputs before
  and after the fix, documenting the FP reduction and any precision/recall tradeoffs
test_plan:
- 'Unit: exercise the pre-filter or description change on a fixture of numeric-dash
  inputs and assert ORGANIZATION is not emitted'
- 'Integration: full benchmark run on Ai4Privacy ORGANIZATION split, assert F1 delta
  <= 1 point'
- 'Regression: existing 1137 tests remain green'
notes: "Filed 2026-04-13 during Sprint 8 Item 2 execution. The Item 2 fix in tests/test_regex_engine.py\
  \ pins TestSampleValueMatching to regex-only semantics so this GLiNER2 FP cannot\
  \ silently break those tests again \u2014 but the underlying GLiNER2 false positive\
  \ is real and should be fixed for production inference quality. Do NOT demote ORGANIZATION\
  \ in the orchestrator as a workaround \u2014 that would paper over the model issue.\
  \ Root cause is either the description prompt being too loose, or GLiNER2 lacking\
  \ training data for numeric-code inputs."
