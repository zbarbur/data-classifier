title: Structured secret scanner (JSON/YAML/env key-value + entropy)
status: doing
priority: P1
category: feature
sprint_target: 3
created: 2026-04-10
updated: 2026-04-11
depends_on: []
tags: []
goal: "Build a structured secret scanner engine that parses JSON/YAML/env/code formats,\
  \ extracts key-value pairs, and scores secrets via key-name dictionary + Shannon\
  \ entropy \u2014 catches credentials regex cannot detect"
complexity: L
technical_specs:
- "File: data_classifier/engines/secret_scanner.py \u2014 new engine with parse\u2192\
  extract\u2192score\u2192filter pipeline"
- "File: data_classifier/patterns/secret_key_names.json \u2014 curated key-name dictionary\
  \ with scores (0.0-0.95)"
- "File: data_classifier/engines/parsers/ \u2014 JSON, YAML, env, code string literal\
  \ parsers"
- "File: data_classifier/orchestrator/orchestrator.py \u2014 register secret scanner\
  \ in cascade"
- "File: data_classifier/profiles/standard.yaml \u2014 add secret_scanner to profile\
  \ engine list"
- "Scoring: composite = key_name_score \xD7 value_score (entropy + char class + length)\
  \ \xD7 structure_boost"
- "Sources: detect-secrets (Apache 2.0) for keywords/thresholds, gitleaks (MIT) for\
  \ FP suppression, trufflehog (AGPL \u2014 reference only) for key-name coverage"
description: ''
acceptance_criteria:
- Engine implements ClassificationEngine interface with order=4 (after heuristic)
- Parsers for JSON, YAML, env (.env KEY=VALUE), and code string literals (identifier
  = 'value')
- Key-name dictionary with scored entries curated from detect-secrets keywords, gitleaks
  patterns, trufflehog reference (200+ key names)
- 'Shannon entropy scoring with thresholds: hex >3.5 bits/char, base64 >4.0 bits/char,
  alphanumeric >4.5 bits/char'
- "Anti-indicator suppression: 'example', 'test', 'placeholder', known example values\
  \ (AKIAIOSFODNN7EXAMPLE) \u2192 suppress"
- "Detects: DB_PASSWORD=secret, {\"api_key\": \"8f14e45f...\"}, export TOKEN=abc123\
  \ \u2014 secrets with no known regex format"
- 'Does NOT fire on: {"name": "John"}, KEY=low_entropy_value, example/placeholder
  values'
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . && ruff format --check .)
test_plan:
- "tests/test_secret_scanner.py: parser unit tests \u2014 valid JSON, YAML, env, code\
  \ literals parsed correctly"
- "tests/test_secret_scanner.py: key-name scoring \u2014 api_key\u21920.95, password\u2192\
  0.95, config_path\u21920.0"
- "tests/test_secret_scanner.py: entropy scoring \u2014 high entropy strings detected,\
  \ low entropy rejected"
- "tests/test_secret_scanner.py: composite scoring \u2014 key-name + entropy combined\
  \ correctly"
- "tests/test_secret_scanner.py: anti-indicator suppression \u2014 example/test/placeholder\
  \ values suppressed"
- "tests/test_secret_scanner.py: integration \u2014 DB_PASSWORD=secret detected, name=John\
  \ not detected"
- "tests/test_secret_scanner.py: edge cases \u2014 malformed JSON, empty values, nested\
  \ structures"
- 'Benchmark: add credential samples to accuracy_benchmark, measure secret scanner
  P/R/F1'
notes: ''
phase: plan
