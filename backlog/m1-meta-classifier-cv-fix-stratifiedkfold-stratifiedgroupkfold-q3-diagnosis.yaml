  best-C selection grid search
- grep -q 'StratifiedGroupKFold\|GroupKFold' scripts/train_meta_classifier.py passes
- Retrained data_classifier/models/meta_classifier_v1.pkl + metadata.json generated
  from the same training_data.jsonl with the new splitter
- New meta_classifier_v1.metadata.json has best_c <= 50 (was 100); field is inspectable
  via python -m json.tool
- "CONVERGENCE CHECK: new cv_mean_macro_f1 is within 0.10 of loco_mean_macro_f1 in\
  \ the metadata (was 0.92 vs 0.30 \u2014 a 0.62 gap that the fix should collapse\
  \ to <=0.10)"
