goal: "Fix the meta-classifier CV splitter from StratifiedKFold to StratifiedGroupKFold\
  \ with groups=corpus so CV stops leaking corpus signatures across folds. Rebuild\
  \ the v1 artifact, re-evaluate, and reconcile the reported CV/LOCO gap (currently\
  \ 0.92 vs 0.30 \u2014 a methodology artifact). Discovered by Q3 \xA76."
complexity: S
technical_specs:
- "File: scripts/train_meta_classifier.py \u2014 replace StratifiedKFold(...) construction\
  \ with StratifiedGroupKFold(...); thread groups parameter through cross_val_score\
  \ / GridSearchCV calls; groups list must be aligned row-by-row with X, y from the\
  \ corpus column of training_data.jsonl"
- "File: data_classifier/models/meta_classifier_v1.pkl + meta_classifier_v1.metadata.json\
  \ \u2014 regenerated via scripts/train_meta_classifier.py run; install smoke test\
  \ must still pass (scripts/install_smoke_test.py) confirming bundled artifact reachable\
  \ via importlib.resources"
- "File: tests/test_meta_classifier_training.py \u2014 new test TestGroupAwareCvSplitter::test_training_uses_stratified_group_kfold\
  \ that inspects the splitter class name at training time (no full training required)"
- "File: docs/sprints/SPRINT6_HANDOVER.md \u2014 add 'Methodology correction \u2014\
  \ M1' subsection under Known Issues noting the corrected CV number and the fact\
  \ that the 0.92 headline was a corpus-leakage artifact"
- "File: docs/research/meta_classifier/sharding_strategy.md \u2014 update \xA76 (CV\
  \ strategy) to recommend StratifiedGroupKFold; retain the original text as historical\
  \ record with a superseded note"
- "File: tests/benchmarks/meta_classifier/evaluate.py \u2014 verify no changes required\
  \ (LOCO evaluation is independent of CV splitter choice); if M2 lands together,\
  \ this file may need the model-actual-C fix"
description: ''
