goal: "Fix the meta-classifier CV splitter from StratifiedKFold to StratifiedGroupKFold\
  \ with groups=corpus so best-C selection stops rewarding corpus fingerprinting.\
  \ This is a correctness fix: the Sprint 6 headline CV macro F1 = 0.916 is a methodology\
  \ artifact, and honest generalization estimate is LOCO macro F1 \u2248 0.30. Per\
  \ Q3 \xA75a, the production CV currently picks C=100 (worst LOCO on the 13-feature\
  \ schema); GroupKFold selects C\u22481 and raises LOCO to ~0.3427 (\u0394 +0.034).\
  \ This closes ~6% of the 0.55 gap \u2014 a real correctness improvement, NOT a gap\
  \ collapse. The gap persists because it is structural (Q3 \xA76: hypothesis A+C\
  \ dominate, weak B)."
complexity: S
