notes: STALE / REDUNDANT as discovered 2026-04-13. Sprint 8 Item 5 (data-classifier-download-models
  CLI + AR Generic repo + _find_bundled_onnx_model auto-discovery) already solved
  the real need. The 333MB model.onnx exceeds GitHub's 100MB per-file limit, making
  the 'bundle in the repo' acceptance criterion impossible. data_classifier/models/gliner_onnx/README.md
  (committed Sprint 8) explicitly documents the dir is 'intentionally empty in the
  source tree' and the model ships via the download_models CLI. No work to do here
  unless the meta-classifier feature pipeline actually gains a dependency on bundled
  ONNX that the download_models CLI can't satisfy. Recommend closing as won't-do in
  sprint-end triage.
