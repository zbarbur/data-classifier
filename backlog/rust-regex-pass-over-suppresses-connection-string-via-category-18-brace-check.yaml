goal: Stop Rust unified detector from dropping high-confidence connection_string regex
  matches that contain URI placeholder syntax like {database}. Restore parity with
  Python on case 2975 (mysql+pymysql://{user}:{pass}@{host}/{database}).
complexity: S
technical_specs:
- "File: data_classifier_core/src/secret_detector/regex_pass.rs \u2014 make value_is_obviously_not_secret()\
  \ conditional on confidence threshold OR add per-pattern skip_fp_filters bypass"
- "File: data_classifier_core/src/secret_detector/fp_filters.rs:359-365 \u2014 Category\
  \ 18 currently flags ANY value containing { and } unless it has ${; this fires on\
  \ legitimate URI syntax in connection strings"
- "Recommended fix (Option 2 in investigation memo): skip Category 18 when confidence\
  \ >= 0.85 \u2014 preserves protection for low-conf generic patterns, exempts high-conf\
  \ scheme-anchored patterns like connection_string (conf 0.9)"
- 'Architectural context: Python has two-stage pipeline (regex_engine.py runs only
  stopwords+validator; secret_scanner.py runs is_placeholder_pattern + fp_filters).
  Rust merged both into regex_pass.rs running all gates on every match. Confidence-aware
  FP gating restores the spirit of the Python staging without rewiring.'
