description: "Sprint 11 Phase 6 (commit e1ea2dc) expanded stopwords.json from 19 to\
  \ 34\nentries with well-known fake credential strings from public FP catalogs.\n\
  An additional ~5 high-value entries were prepared but removed from the\nfinal commit\
  \ because GitHub push protection blocked them. The removed\nentries belonged to\
  \ three categories of public-documentation placeholder\nvalues used by major SDKs:\
  \ (a) published payment-processor test keys,\n(b) full-length version-control PAT\
  \ placeholders, (c) messaging-platform\nbot / user token placeholders. In every\
  \ case the string is a published\ndoc value \u2014 not a real secret \u2014 but\
  \ GitHub's secret scanner pattern-\nmatches on the shape and rejects the push regardless.\n\
  \nThe codebase already has a solution for this exact problem:\ndata_classifier/patterns/default_patterns.json\
  \ stores credential examples\nusing an xor: prefix with base64-encoded bodies, decoded\
  \ at load time\nby data_classifier/patterns/__init__.py::_decode_examples. This\
  \ item\nextends the same decoding path to the stopwords loader in\ndata_classifier/engines/regex_engine.py::_load_global_stopwords\
  \ so the\nblocked entries can be re-added using the encoded form.\n\nPhase 6 took\
  \ the simpler path of removing the strings entirely to land\nthe rest of the expansion\
  \ on time. The loss is narrow \u2014 each removed\nentry would only reject columns\
  \ whose sample values are exactly that\nliteral string \u2014 but the pattern of\
  \ \"avoid entries that look like real\ncredentials even though they aren't\" is\
  \ a durable blocker for every\nfuture stopwords expansion, so wiring XOR support\
  \ once is the right\nlong-term fix.\n\nNot urgent (Sprint 11 Phase 6 is otherwise\
  \ complete) but should land\nbefore the next stopwords expansion item to avoid repeating\
  \ the same\npush-protection block.\n"
