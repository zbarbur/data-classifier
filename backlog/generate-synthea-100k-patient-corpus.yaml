notes: |
  Source: docs/experiments/meta_classifier/dataset_landscape.md, Tier 4 healthcare.

  Synthea is structurally different from every other corpus we have. It
  produces ACTUAL TABULAR DATA with column-name-as-label semantics. Our
  existing ETL (NER spans → column values) is upside-down for this case:
  we read CSV columns directly and emit them as column values per the
  existing ColumnInput shape.

  WHY THIS MATTERS: data_classifier's API is "given column samples, classify
  the column." Synthea data is the most authentic possible match for that
  API — it's literally column samples from real-shaped tables. Every other
  training corpus required us to fake column boundaries from NER spans.

  ENTITY TYPES SYNTHEA SUPPLIES that we currently lack:
  - MEDICAL_RECORD_NUMBER (MRN)
  - ICD diagnosis codes
  - Medication names
  - Insurance / payer IDs
  - Provider IDs (NPI is already supported but Synthea's provider table
    has more provider-side fields)
  - Encounter IDs

  DECISION POINT: do we add these as new entity types in our taxonomy?
  Pros: more accurate classification of healthcare columns, supports
  HIPAA-relevant detection use cases. Cons: more output classes for the
  meta-classifier (currently 24, would grow to ~30), more validators to
  maintain, may break existing fixture tests.

  Recommend: file a sub-item to decide on healthcare entity type expansion
  separately. This item just gets the data ingested and adds the schema
  map; the entity type expansion can come second.

  ETL EFFORT IS S because we don't need NER processing. Read CSV → map
  column name to entity type → emit as column samples. Trivial.

  Synthea generation is independent of Sprint 8 work AND independent of
  the gretel ingestion. Can run in parallel with anything.

  License: Apache 2.0 verified at https://github.com/synthetichealth/synthea/blob/master/LICENSE
