goal: "Generate a 100k-patient Synthea (MITRE) synthetic healthcare dataset and integrate as the 9th training corpus. Synthea is uniquely valuable because it produces structured CSV tables with column names already labeled by semantic type (e.g. patients.SSN, patients.DRIVERS, observations.VALUE) — no NER-span-to-column ETL needed. This is the only open corpus that structurally matches data_classifier's per-column classification API."
