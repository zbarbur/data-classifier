acceptance_criteria:
- New ColumnNameEngine class implementing ClassificationEngine interface
- 400+ sensitive field name variants across PII, Financial, Credential, Health categories
- 'Normalized matching: lowercase, strip underscores/hyphens/spaces'
- Abbreviation expansion (dob->date_of_birth, ssn->social_security_number, cc->credit_card,
  etc.)
- Multi-token matching (customer_social_security_num -> SSN)
- Column name variants stored in data_classifier/patterns/column_names.json
- Engine registered in orchestrator with order=1 (before regex)
- Returns entity_type, category, sensitivity, confidence based on match quality
- No match on generic names (id, value, field1, col_a, status, data)
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . && ruff format --check .)
