goal: "Swap the shard builder's secretbench input from the upstream secretbench_sample.json\
  \ (v1) to the relabeled secretbench_sample_v2.json produced by research/meta-classifier@0c05376.\
  \ v2 corrects 178 upstream is_secret=True labels that are prose sentences, bare\
  \ ${VAR} refs, empty XML tags, and path fragments \u2014 i.e., not secrets under\
  \ value-classification semantics. Without this swap, Sprint 14 benchmark numbers\
  \ carry a ~34% label-noise floor on the credential side.\n"
