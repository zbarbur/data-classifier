description: 'Surfaced 2026-04-17 by research/meta-classifier investigation. Full

  context at docs/research/meta_classifier/binary_pii_gate_evaluation_memo.md

  Finding 3.


  SecretBench (Basak & Neil, MSR 2023) labels candidate secrets based on

  whether a real leak existed somewhere in the file where the scanner''s

  match fired. That''s tool-alignment semantics, not value-classification

  semantics. On our 1,068-row fixture, 34.5% of is_secret=True entries

  are structurally not-a-secret under value-classification semantics:

  prose sentences, empty <Password></Password> tags, bare ${VAR} refs,

  path fragments, and case "Password": code tokens.


  v2 flips 178 of 516 is_secret=True labels via 11 conservative

  structural rules plus 11 edge cases user-reviewed on 2026-04-17. All

  flipped rows preserve upstream_is_secret + relabel_rule + relabel_notes

  for audit.


  Ships the new baseline; benchmark numbers reported in Sprint 14

  handover should use v2.

  '
