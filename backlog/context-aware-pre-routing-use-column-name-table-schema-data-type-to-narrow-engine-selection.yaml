description: "Companion to shape-first routing. Before running engines, analyze ALL\
  \ available context: column name (already used by column_name_engine but not by\
  \ orchestrator), table_name (on ColumnInput since Sprint 3, only shallow consumption),\
  \ schema_name, data_type (VARCHAR vs INT constrains candidates), description. This\
  \ context should: (1) narrow candidate entity types before engines run (INT column\
  \ can't be EMAIL), (2) inform domain (patient_records table \u2192 healthcare),\
  \ (3) select engine strategy per shape+context combination. Currently only column_name_engine\
  \ uses column name, and only for direct entity-type matching. Table/schema/data_type/description\
  \ are effectively unused. BQ confirmed populating these fields (Sprint 10). Complexity:\
  \ L."
