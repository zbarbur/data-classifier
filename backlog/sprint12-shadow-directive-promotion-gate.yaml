goal: "Promote meta-classifier v3 (or its v4/v5 successor trained on the new features)\
  \ from shadow to directive: wire the orchestrator to use v3 prediction as the source\
  \ of truth for subtype ranking, delete the shadow emission codepath entirely, and\
  \ re-baseline the canonical family benchmark on directive output. No env flag \u2014\
  \ v3 is on by default for all consumers."
complexity: L
technical_specs:
- "File: data_classifier/orchestrator/orchestrator.py \u2014 replace the existing\
  \ 7-pass merge / dedup / suppression pipeline's subtype-ranking step with a v3-driven\
  \ dispatch. v3 prediction becomes the source of truth when multiple candidate findings\
  \ collide on a column."
- "File: data_classifier/orchestrator/orchestrator.py \u2014 delete the meta_classification\
  \ event emission. There is one decision per finding, not two. No feature flag \u2014\
  \ the shadow codepath is removed, not gated."
- "File: data_classifier/events/types.py \u2014 remove or deprecate the shadow MetaClassificationEvent\
  \ type if it is unused after the deletion. Confirm no other consumer touches it."
- "File: tests/benchmarks/family_accuracy_benchmark.py \u2014 re-baseline against\
  \ directive predictions. Write the new baseline to docs/research/meta_classifier/sprint12_family_benchmark.json.\
  \ The Sprint 11 file (sprint11_family_benchmark.json) becomes the historical reference;\
  \ the Sprint 12 file becomes the new ship gate."
- "File: docs/CLIENT_INTEGRATION_GUIDE.md \u2014 update \xA75A.6 (orchestrator merge\
  \ pipeline) to describe the new v3-directive dispatch. Remove all shadow-mode references."
- "File: data_classifier/__init__.py \u2014 verify ClassificationFinding.family auto-population\
  \ still works after the orchestrator change (added in Sprint 11)."
- 'Run a directive A/B before flipping the switch: shadow-v3 numbers (5.85% / 0.9286)
  are not guaranteed to translate one-for-one to directive. The new directive baseline
  must hit the ship gates before the shadow codepath is deleted.'
description: "This is THE headline item for Sprint 12 \u2014 the sprint where v3 stops\
  \ being\nshadow and becomes the only classification decision path. Everything else\n\
  in Sprint 12 (the validator-rejected-credential feature, the\nhas_dictionary_name_match\
  \ feature, the ai4privacy openpii-1m re-ingest)\nexists to make this item land safely.\n\
  \nSprint 12 reframe (decided 2026-04-15 at Sprint 11 close): the original\nplan\
  \ was to ship shadow v3 in v0.11.0 to BQ, measure for a sprint, then\nflip to directive\
  \ in Sprint 12 behind an env flag. User explicitly\nrejected this approach: \"We're\
  \ not going to deliver it to BQ yet, I'd\nprefer to move directly to sprint 12 where\
  \ it's turned on, eliminate the\ncomplexity of multiple scanner and handle all issues.\"\
  \n\nSprint 11 Phase 10 shadow A/B showed the shadow path is structurally\ncapable\
  \ of emitting classes the live cascade cannot produce:\n\n- HEALTH family: live\
  \ F1 0.000 / shadow F1 0.967\n- CREDENTIAL (generic): live F1 0.000 / shadow F1\
  \ 0.867\n- NEGATIVE: live F1 0.000 / shadow F1 0.595 (lifted to ~0.75 by item #1)\n\
  \nPromoting v3 to directive adds ~1,066 newly-correct predictions (out of\n10,170\
  \ test shards) at the Sprint 11 batch level of shadow quality, with\nthe Sprint\
  \ 12 prerequisite items lifting that further. The risk is that\nshadow numbers don't\
  \ translate to directive numbers \u2014 hence the directive\nA/B in the test plan\
  \ and the hard re-baseline against the new family\nbenchmark file.\n\nDependencies:\
  \ this item is gated on (a) the validator-rejected-credential\nfeature landing and\
  \ lifting NEGATIVE F1, (b) the has_dictionary_name_match\nfeature landing and lifting\
  \ CONTACT precision, and (c) the ai4privacy\nopenpii-1m re-ingest feeding the v3\
  \ retrain. All three must complete and\nthe new model must be trained before the\
  \ orchestrator wiring step. If any\nof the prerequisites slip the directive flip\
  \ cannot ship in Sprint 12 and\nthis item rolls to Sprint 13 with the rest of the\
  \ release sequence.\n"
acceptance_criteria:
- Orchestrator subtype-ranking dispatch uses meta-classifier v3 (or its v4/v5 successor)
  prediction as source of truth when multiple candidate findings collide on a column
- "Shadow MetaClassificationEvent emission code is deleted from data_classifier/orchestrator/orchestrator.py\
  \ \u2014 not feature-flagged"
- Family benchmark cross_family_rate < 0.040 measured on DIRECTIVE predictions (not
  shadow)
- Family benchmark family_macro_f1 >= 0.92 measured on DIRECTIVE predictions
- 'NEGATIVE family F1 >= 0.70 on directive (combined effect of item #1 + directive
  flip)'
- 'CONTACT family precision >= 0.93 on directive (combined effect of item #2 + directive
  flip)'
- 'LOCO macro F1 >= 0.30 on directive, measured via 5-corpus StratifiedGroupKFold
  held-out evaluation. This is the primary out-of-distribution safety check: BQ
  customers are, by definition, running against corpora the classifier has never
  seen. The current honest LOCO estimate (M1 methodology on v3 shadow) is ~0.17,
  so 0.30 is a ~2x improvement bar. Added 2026-04-15 after discovery that the
  original acceptance criteria measured only in-distribution (training-corpus)
  metrics and did not catch the out-of-distribution risk. If this bar is not
  met by the directive flip, see the companion safety-analysis memo dependency.'
- 'Heterogeneous column regression check: run the new log-shaped column test
  fixture (tests/test_heterogeneous_column_regression.py — to be created as part
  of this work) on both directive and live cascade. Confirm that directive does
  not emit degenerate (constant-entity) predictions on columns containing mixed
  content (emails + API keys + free text in one column). If directive emits
  worse output than live on heterogeneous columns, the HeterogeneousColumnFinding
  gap blocks the promotion — see companion gated-architecture backlog item
  (Q8 continuation, sprint_target 13).'
- New baseline file docs/research/meta_classifier/sprint12_family_benchmark.json committed
  and referenced as the new ship gate in CLAUDE.md sprint completion gate
- "docs/CLIENT_INTEGRATION_GUIDE.md \xA75A.6 updated to describe v3-directive dispatch\
  \ with no shadow-mode references"
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . --exclude .claude/worktrees && ruff format --check . --exclude
  .claude/worktrees)
- Family benchmark CLI command in CLAUDE.md sprint completion gate updated to point
  at sprint12_family_benchmark.json
test_plan:
- "tests/benchmarks/family_accuracy_benchmark.py: directive A/B run BEFORE deleting\
  \ shadow code \u2014 both directive and shadow predictions emitted, side-by-side\
  \ comparison written to /tmp/directive_ab.json"
- 'tests/test_orchestrator.py: add directive-dispatch tests covering the collision-resolution
  paths that previously went through the 7-pass merge'
- "tests/test_meta_classifier_features.py: regression \u2014 feature vector dimensionality\
  \ unchanged from v3 baseline (or correctly bumped to v4/v5)"
- 'Family benchmark sweep: run on full 10,170-shard set with directive ON, write summary.json
  to docs/research/meta_classifier/sprint12_family_benchmark.json'
- 'Regression check: no existing family that was >= 0.95 on live drops below 0.93
  on directive'
- Compare-to check against sprint11_family_benchmark.json for cross_family_rate regression
  detection
- 'LOCO eval harness run: re-run tests/benchmarks/meta_classifier/evaluate.py (or
  the M1-methodology LOCO audit script) on the post-Sprint-12 v4/v5 artifact.
  Emit per-corpus F1 breakdown to /tmp/loco_audit.json. Assert mean LOCO F1 >= 0.30.
  If assertion fails, block the promotion and defer to the companion safety memo.'
- 'Heterogeneous column fixture: create tests/test_heterogeneous_column_regression.py
  with a synthetic log-line column containing 10+ values that each embed a
  different entity (email, API key, phone, free text). Run classify_column on it
  with the directive path. Assert that the output is NOT a single constant-entity
  classification (i.e., the flat classifier did not collapse the mixed content
  to one wrong label with no indication of the other entities present). This is
  a minimal regression gate — it does not require the full HeterogeneousColumnFinding
  implementation, only that directive does not silently emit worse output than
  live on this case.'
notes: |
  Re-scoped 2026-04-15 at /sprint-start 12 from the original env-flag opt-in
  design to the reframe's "single landing, no flag, shadow path deleted"
  design. The original goal/AC/tech-specs are preserved in git history
  before this commit if needed for context.

  Order-of-operations within Sprint 12:
  1. Land items #1 (validator-rejected-credential) + #2 (has_dictionary_name_match)
     and the ai4privacy openpii-1m ingest
  2. Retrain v3 → v4 (or v5) on the new features + new corpus
  3. Run the directive A/B with the new model
  4. Run the safety-analysis-memo (new dependency, 2026-04-15) — produces
     a GREEN / YELLOW / RED verdict on whether directive is safe to ship.
     Must land before step 5. Covers capacity (LR vs MLP), architecture
     (flat vs gated), and heterogeneous-column risks.
  5. If A/B passes ship gates AND safety memo returns GREEN (or YELLOW
     with mitigations), do the orchestrator wiring + shadow deletion in
     one commit. If RED, block the directive flip and ship v0.12.0 with
     shadow-only, deferring the promotion to Sprint 13 where the gated
     architecture item closes the gaps.
  6. Re-run the family benchmark on directive output and write the new
     baseline file
  7. THEN hand off to the v0.12.0 release item

  Risk to flag — original (cross_family_rate regression): family_macro_f1
  > 0.92 and cross_family_rate < 0.06 are shadow numbers from Sprint 11.
  Directive numbers may differ in either direction. Build a "stop here
  and roll back" decision point into the A/B step — if directive numbers
  regress vs shadow by more than 2 percentage points on cross_family_rate,
  the directive flip rolls to Sprint 13 and Sprint 12 ships v0.11.x with
  shadow-only.

  Risk to flag — added 2026-04-15 (architectural gap):
    Sprint 12's original acceptance criteria measured only in-distribution
    (training-corpus) metrics. The honest out-of-distribution LOCO estimate
    for v3 is ~0.17 under M1 StratifiedGroupKFold — a number that the
    original promotion-gate criteria did not surface. The flat v3
    classifier also cannot represent mixed-content (log-shaped) columns
    because ClassificationFinding is single-valued; the Sprint 9 learning
    memo at docs/learning/sprint9-cv-shortcut-and-gated-architecture.md §5
    designed a 3-branch gated architecture (credential / PII /
    heterogeneous + HeterogeneousColumnFinding type) to address exactly
    these gaps, but Sprint 11 shipped a soft-gating workaround
    (primary_entity_type one-hot) that delivered +0.27 macro F1 without
    addressing LOCO or the heterogeneous case. The designed architecture
    is filed as a P1 backlog item (gated-meta-classifier-architecture-...-q8-continuation),
    fleshed out 2026-04-15 and targeting Sprint 13.

    The acceptance criteria additions made on 2026-04-15 (LOCO ≥ 0.30,
    heterogeneous regression check) exist to surface these gaps BEFORE
    the Sprint 12 promotion flip — so the team makes an explicit go/no-go
    decision with out-of-distribution evidence, rather than inheriting
    the 0.17 LOCO silently.

    If the LOCO bar is missed, the honest answer is Sprint 12 ships
    v0.12.0 with shadow-only and the directive flip waits for Sprint 13
    where the gated architecture lands. This is not a failure of Sprint
    12 — it is Sprint 12 correctly refusing to ship a model that doesn't
    generalize to new data sources.

