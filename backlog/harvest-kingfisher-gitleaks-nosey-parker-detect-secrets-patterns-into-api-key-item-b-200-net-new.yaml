title: Harvest Kingfisher + gitleaks + Nosey Parker + detect-secrets patterns into
  API_KEY (Item B, 200+ net-new)
status: backlog
priority: P1
category: feature
sprint_target: 8
created: 2026-04-13
updated: 2026-04-13
depends_on: []
tags: []
goal: "Bulk-import 200-500 credential detection regex patterns from license-compatible\
  \ sources (Kingfisher primary + gitleaks + Nosey Parker + detect-secrets + LeakTK\
  \ + ripsecrets) into data_classifier/patterns/default_patterns.json, all targeting\
  \ the new API_KEY entity type that Item A introduces. Service-prefixed API keys\
  \ are the cleanest possible credential signal \u2014 regex detection gives near-zero\
  \ false positive risk and zero training data requirement. Current pattern library\
  \ has single-digit service-specific credential patterns. Landscape survey identified\
  \ MongoDB Kingfisher (Apache 2.0, 800+ rules) as the single highest-value source\
  \ beyond gitleaks \u2014 covers the SaaS/observability/ITSM ecosystem that gitleaks\
  \ misses."
complexity: L
technical_specs:
- "PRIMARY source: MongoDB Kingfisher https://github.com/mongodb/kingfisher \u2014\
  \ Apache 2.0, ~800 YAML rules, expected net-new yield 400-500 after dedup. Covers\
  \ Datadog, New Relic, Sentry, Dynatrace, PagerDuty, Auth0, Okta, LaunchDarkly, Salesforce,\
  \ HubSpot, Jira, Confluence, Shopify, Cloudflare, Vercel, Monday, Zendesk, Intercom,\
  \ and ~30 other categories gitleaks misses"
- "SECONDARY: gitleaks config.toml (MIT, ~100 rules, expected 80-90 net-new after\
  \ Kingfisher dedup) \u2014 use as production-hardened validation baseline"
- "PRECISION SUPPLEMENT: Praetorian Nosey Parker (Apache 2.0, 188 rules, expected\
  \ 20-30 net-new after dedup) \u2014 use as second-opinion filter; patterns in BOTH\
  \ Kingfisher and Nosey Parker are high-confidence, patterns only in Kingfisher get\
  \ manual review"
- 'TIER 2 sources: detect-secrets (Apache 2.0, 10-15 net-new); LeakTK (MIT Red Hat
  curation, 10-15 net-new); ripsecrets (MIT, near-zero-FP baseline, use as gap detector)'
- "CROSS-CHECK: GitHub secret scanning partner list (200+ services, CC-BY-4.0 docs)\
  \ \u2014 use to identify uncovered services; re-derive patterns from vendor documentation,\
  \ not GitHub's page"
- 'EXCLUDED sources (license incompatibility): trufflehog (AGPL-3.0, detector list
  only as gap indicator), Semgrep Rules (SRL v1.0), Atlassian SAST (LGPL-2.1), mazen160/secrets-patterns-db
  (AGPL-derived mix), shhgit (unmaintained), Rusty-Hog (trufflehog-derived dormant)'
- "File: scripts/ingest_credential_patterns.py (new) \u2014 fetches each source repo\
  \ at a pinned revision (not HEAD), deduplicates across sources with precedence Kingfisher\
  \ > gitleaks > Nosey Parker > detect-secrets > LeakTK > ripsecrets, produces a patch-format\
  \ update to default_patterns.json"
- "Deduplication logic: same service \u2192 pick pattern with tightest regex (smallest\
  \ char class surface), most specific prefix anchoring, best attribution (known upstream\
  \ > derived)"
description: ''
acceptance_criteria:
- data_classifier/patterns/default_patterns.json grows by >=200 credential patterns
  (net-new, after deduplication with existing patterns and cross-source dedup)
- 'Each new pattern has: unique id including service name (e.g. aws_access_key_id,
  stripe_live_secret_key, datadog_api_key); RE2-compatible regex; entity_type: API_KEY;
  category: credential; confidence appropriate to regex specificity; positive/negative
  test fixtures; attribution field pointing to source repo + license'
- Gitleaks benchmark corpus detection F1 improves from Sprint 5 baseline (macro F1
  0.897) by >=0.05
- SecretBench detection rate improves by >=0.03
- No regression in non-credential benchmark F1 (Nemotron, Ai4Privacy blind mode)
- New docs/LICENSE_AUDIT_credential_patterns.md file documents source of each imported
  pattern + license, one table section per source with (pattern_id, upstream_name,
  upstream_license, upstream_url, our_confidence) rows
- CI check fails if any pattern references trufflehog directly, semgrep-rules, atlassian-sast-ruleset,
  or secrets-patterns-db (license incompatibility)
test_plan:
- 'Unit: every new pattern has >=1 positive fixture (known valid token from service
  docs, NEVER real credentials) and >=1 negative fixture (lookalike that should NOT
  match)'
- 'Pattern library regression test: iterate the full pattern list, confirm each compiles
  in re2 and each example matches'
- 'Benchmark delta report: run accuracy_benchmark before and after import; confirm
  >=0.05 improvement on gitleaks corpus and >=0.03 on SecretBench'
- 'License audit test: CI confirms every pattern has either an attribution field or
  docs/LICENSE_AUDIT_credential_patterns.md entry'
- 'License exclusion check: CI greps for trufflehog/semgrep-rules/atlassian-sast-ruleset/secrets-patterns-db
  in pattern metadata; fails if found'
- 'Cross-check against GitHub partner list: automated or manual verification that
  every service in the partner list is either covered or has a tracked gap'
