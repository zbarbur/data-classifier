notes: 'EXTENSION discussed 2026-04-13: the gated architecture needs THREE stage-1
  outcomes, not two. Sibling gate for heterogeneous/log-shaped columns (e.g., log_line
  column containing a mix of emails, API keys, and free text). Per-value entropy variance
