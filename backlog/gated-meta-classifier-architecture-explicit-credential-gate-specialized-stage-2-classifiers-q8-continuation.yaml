goal: >
  Rebuild the meta-classifier as the 3-branch gated architecture originally
  designed in the Sprint 9 learning memo (docs/learning/sprint9-cv-shortcut-and-gated-architecture.md
  §5). Replace the current single flat LR (v3, with soft-gating via
  primary_entity_type one-hot) with a hard-gated architecture: deterministic
  stage-1 rule that routes columns to one of three specialized stage-2 paths —
  (A) credential-subtype classifier, (B) PII multi-class classifier, (C)
  per-value NER with HeterogeneousColumnFinding list output for log-shaped
  mixed-content columns. Primary objective is to close the LOCO generalization
  gap (current ~0.17 under honest M1 StratifiedGroupKFold CV) to >= 0.40.
  Secondary objective is to introduce the HeterogeneousColumnFinding output
  type so log/message columns — which the current single-valued
  ClassificationFinding cannot represent at all — get correct list-of-entities
  output instead of silent degenerate collapse.
complexity: XL
technical_specs:
- 'Stage-1 deterministic gate — new pure function
  `_evaluate_stage1_gate(column, sample_stats)` in
  data_classifier/orchestrator/meta_classifier.py. Returns one of three
  outcomes: HOMOGENEOUS_CREDENTIAL, HOMOGENEOUS_PII, HETEROGENEOUS.
  Heuristics per Sprint 9 memo §5: per-value entropy variance, column-name
  hints, partial regex match ratios, Chao-1 cardinality, dict-word-ratio.
  Thresholds start as documented constants and get tuned during development.
  Gate is deterministic and auditable — not an ML classifier.'
- 'Stage-2a specialized credential-subtype classifier — train a specialized
  LR (or MLP, contingent on the Sprint 12 safety-analysis-memo capacity
  verdict) on the credential subtask. Target classes: API_KEY, PRIVATE_KEY,
  PASSWORD_HASH, OPAQUE_SECRET, NEGATIVE. Input: v4+ feature vector restricted
  to training rows whose stage-1 gate outcome is HOMOGENEOUS_CREDENTIAL.
  Per-branch hyperparameter tuning explicitly allowed — this is one of the
  advantages of hard-gating over soft-gating. Output artifact:
  data_classifier/models/meta_classifier_v4_credential.pkl with matching
  metadata.json.'
- 'Stage-2b specialized PII multi-class classifier — train a specialized LR
  (or MLP) on the PII subtask. Target classes: the 19 PII subtypes.
  Input: v4+ feature vector restricted to training rows whose stage-1 gate
  outcome is HOMOGENEOUS_PII. Output artifact:
  data_classifier/models/meta_classifier_v4_pii.pkl.'
- 'Stage-2c per-value NER path for heterogeneous columns — reuse existing
  GLiNER engine but run it per-value instead of per-column. Aggregate
  per-value predictions into a list. Emit as HeterogeneousColumnFinding
  (new type). Per-value NER bypasses the flat meta-classifier entirely —
  it is a fundamentally different output shape. May require optimization
  if latency is prohibitive at scale — add batch inference to the GLiNER
  engine if needed.'
- 'New HeterogeneousColumnFinding type in data_classifier/core/types.py —
  either a new dataclass alongside ClassificationFinding or an extension
  of ClassificationFinding with a new `findings: list[PerValueFinding]`
  field. Carries a list of per-value findings with match_ratios, NOT a
  single classification. This is the FIRST time the library emits
  non-single-valued findings — requires a public API contract update.
  Coordinate with BQ consumer team on how they handle list output
  BEFORE implementation.'
- 'Orchestrator dispatch — replace the v3 predict call in
  Orchestrator.classify_column with a gated dispatch: first evaluate
  stage1_gate, then route to the appropriate stage-2 path, then emit
  the appropriate finding type (single or heterogeneous). The existing
  7-pass merge/dedup/suppression pipeline stays in place for
  single-valued findings; a parallel handling path is added for
  HeterogeneousColumnFinding outputs.'
- 'Backward compatibility — if ClassificationFinding is the emitted
  type, orchestrator behavior is unchanged for homogeneous columns.
  Only heterogeneous columns gain the new output type. Existing
  consumers that never see heterogeneous columns are unaffected.
  BQ consumer must update to handle both types IF their workflow
  encounters log-shaped columns.'
- 'Schema version bump — FEATURE_SCHEMA_VERSION v3 → v4 (or v5 if Sprint
  12 already bumped to v4). The branched classifiers share the same base
  feature schema but each has its own pkl. Schema version gate in
  MetaClassifier refuses cross-version loads as today.'
- 'Training pipeline update — scripts/train_meta_classifier.py extended to
  produce three artifacts (v4_credential.pkl, v4_pii.pkl, and optionally
  a heterogeneous-marker model or just the per-value NER call). Single
  training run partitions training_data.jsonl by stage-1 gate outcome and
  trains each branch independently. Metadata file records the stage-1
  partition statistics per branch.'
- 'Client integration guide update — docs/CLIENT_INTEGRATION_GUIDE.md
  §5A (Engines Reference) extended with a new §5A.7 covering the gated
  dispatch flow, the three branches, the HeterogeneousColumnFinding
  contract, and the per-value NER output semantics for consumers who
  want list output.'
- 'Tier-1 credential pattern-hit gate (Sprint 11 item 11-F,
  observability-only, commit bb1644f) — repurpose as a cross-check against
  the new stage-1 gate. The existing GateRoutingEvent stream becomes a
  regression detector: if the new stage-1 gate disagrees with the
  Sprint 11 rule gate on credential routing, emit both events and flag
  the disagreement. The Sprint 11 gate is not deleted — it graduates
  from "observability-only precursor" to "independent cross-validator."'
description: |
  Rebuild of the meta-classifier as the 3-branch gated architecture designed
  in docs/learning/sprint9-cv-shortcut-and-gated-architecture.md (Sprint 9
  learning memo, section 5). This item was filed 2026-04-13 as a P1
  placeholder carrying forward the Sprint 9 design decision, then left with
  empty fields (goal, description, technical_specs, acceptance_criteria,
  test_plan, complexity, sprint_target — all null or empty) for two
  sprints while Sprint 10 and Sprint 11 shipped adjacent work without
  ever fleshing this item out. It is fleshed out 2026-04-15 during the
  Sprint 12 salvage discussion after the discovery that:

  1. Sprint 11 shipped a soft-gating workaround (primary_entity_type
     one-hot in the v3 feature schema, commits c8a145c + ff70775) that
     delivered +0.27 macro F1 on in-distribution metrics — a legitimate
     win but NOT the designed architecture. The workaround did not
     address LOCO generalization (~0.17) and did not address the
     heterogeneous-column case (still unrepresentable).

  2. Sprint 12 is planning to promote v3 from shadow to directive with
     no feature flag and no fallback. The original promotion-gate
     acceptance criteria measured only in-distribution metrics, not
     LOCO. Sprint 12 could pass its gate and still ship a model with
     catastrophic out-of-distribution quality for BQ customers on new
     data sources. 2026-04-15 salvage commit added LOCO and
     heterogeneous acceptance criteria to the promotion-gate item
     + filed a safety-analysis memo as a new Sprint 12 dependency.

  3. The Sprint 9 designed architecture was the explicit answer to
     both risks: hard-gating reduces LOCO by routing to specialized
     per-branch classifiers (each of which can be trained and tuned
     independently); the heterogeneous branch handles log-shaped
     columns via a new HeterogeneousColumnFinding type that the current
     flat architecture cannot represent at all.

  The scope below rebuilds the full Sprint 9 design. It is XL work — the
  largest single item in the project to date — and cannot be compressed
  into Sprint 12. It targets Sprint 13 with the Sprint 12
  safety-analysis-memo as a prerequisite. Depending on the memo's verdict,
  Sprint 12 will either:

  - Proceed with the directive flip as currently planned (if the memo
    returns GREEN — flat v3 is safe for directive)
  - Ship with specific mitigations (if the memo returns YELLOW — gaps
    exist but can be mitigated short of rebuilding the architecture)
  - Ship v0.12.0 with shadow-only and defer the directive flip to
    Sprint 13 (if the memo returns RED — gaps are fundamental and
    require the gated architecture to ship safely)

  This item is the long form of the architecture work that closes the
  gaps in the RED case. It does not preclude GLiNER-as-feature — the
  two are orthogonal. GLiNER-as-feature could be built on top of either
  the flat v3 LR (current) or each of the stage-2 classifiers in the
  gated architecture (post-this-item), and either way the design is
  additive.

  Coordinate carefully with the Sprint 12 session on the
  HeterogeneousColumnFinding type — it is a public API addition that
  BQ's consumer must handle, so the type design should be agreed BEFORE
  implementation starts.
acceptance_criteria:
- >
  LOCO macro F1 >= 0.40 on 5-corpus held-out evaluation using
  StratifiedGroupKFold, measured with the M1 methodology. Current
  baseline is ~0.17 on the flat v3 LR — this is the primary objective.
  The gated architecture exists specifically to close this gap.
- >
  HeterogeneousColumnFinding emits list output on a new log-shaped
  test fixture (tests/test_heterogeneous_column_findings.py). Must
  emit >= 2 distinct per-value findings from a synthetic log-line
  column containing emails + API keys + free text + numeric IDs.
  Single-valued-finding output on a heterogeneous column is a failure.
- >
  No regression on the canonical family benchmark (family_macro_f1
  >= 0.92, cross_family_rate < 0.06) measured on homogeneous columns
  only — heterogeneous columns are out of scope for the single-valued
  family benchmark by design.
- >
  Stage-1 gate precision >= 0.95 measured on a held-out gate-routing
  test set with known-shaped columns. Stage-1 is deterministic and
  must not misroute homogeneous columns to the heterogeneous branch
  (which would drop them into per-value NER unnecessarily) or
  heterogeneous columns to the homogeneous branches (which would
  collapse them into single-entity output).
- >
  Per-branch CV macro F1 >= 0.85 on each branch's own subset
  (credential: 5-class within the CREDENTIAL family; PII: 19-class
  within the PII family). Per-branch hyperparameter tuning allowed
  to hit this bar.
- >
  Backward compatibility: all Sprint 12 canonical family benchmark
  test fixtures that pass on the Sprint 12 v4/v5 directive baseline
  continue to pass after this item's gated architecture lands.
  Regression detector: compare directly against sprint12_family_benchmark.json.
- >
  CLIENT_INTEGRATION_GUIDE.md §5A updated with a new §5A.7 covering
  the gated dispatch flow, the three branches, the HeterogeneousColumnFinding
  contract, and the per-value NER output semantics. BQ consumer team
  is briefed on the new output type BEFORE this item ships.
- >
  Existing tier-1 credential pattern-hit gate (Sprint 11 item 11-F)
  repurposed as an independent cross-validator against the new
  stage-1 gate. Disagreements are flagged via extended GateRoutingEvent.
- Tests pass (pytest tests/ -v, excluding slow benchmarks)
- Lint clean (ruff check . && ruff format --check .)
test_plan:
- 'tests/test_stage1_gate.py — new: unit tests for the deterministic
  gate evaluator across HOMOGENEOUS_CREDENTIAL / HOMOGENEOUS_PII /
  HETEROGENEOUS cases plus edge cases (empty column, single value,
  all-identical values, no regex hits, GLiNER-only hits).'
- 'tests/test_heterogeneous_column_findings.py — new: fixture-based
  assertions that the log-shaped test fixture produces
  HeterogeneousColumnFinding list output with >= 2 per-value entities.'
- 'tests/test_gated_meta_classifier.py — new: integration tests for
  the 3-branch dispatch path, one test per branch, covering the
  stage-1 gate → stage-2 classify → finding emission chain.'
- 'tests/benchmarks/family_accuracy_benchmark.py: re-baseline on the
  gated architecture, compare against sprint12_family_benchmark.json
  (or the v4/v5 ship baseline, whichever is current at Sprint 13 start).'
- 'tests/benchmarks/meta_classifier/loco_audit.py — new: measure LOCO
  macro F1 on the gated architecture vs Sprint 12 v4/v5 flat baseline.
  Must show >= 0.40 target met.'
- 'Regression test: run the Sprint 11 tier-1 rule gate alongside the
  new stage-1 gate. Confirm the new gate is at least as precise as
  the rule gate on the credential routing decision. Disagreements
  are acceptable but flagged for review.'
- 'Per-branch training regression: confirm each stage-2 artifact hits
  its per-branch CV F1 bar on its own subset of training_data.jsonl.'
- 'Client integration guide review: confirm the new §5A.7 section
  renders correctly in the published docs and is consistent with the
  shipped code behavior.'
notes: |
  Fleshed out 2026-04-15 during the Sprint 12 salvage discussion. The
  original empty placeholder was filed 2026-04-13 from the Q8 research
  continuation discussion; see the Sprint 9 learning memo at
  docs/learning/sprint9-cv-shortcut-and-gated-architecture.md §5 for
  the architectural rationale and the 3-branch diagram.

  Relationship to Sprint 11 shipped work:
    Sprint 11 shipped primary_entity_type one-hot (commit c8a145c) +
    v2 training (commit ff70775) + Chao-1 + dict-word-ratio +
    tier-1 credential rule gate (commit bb1644f, observability-only)
    + v3 retrain (commit 1547fd8) + family taxonomy (commits
    bc741d9 / 170ae98). The net effect was +0.27 macro F1 on
    in-distribution metrics, which is real and valuable. However,
    soft-gating via one-hot does not close the LOCO gap (still ~0.17)
    and does not address heterogeneous columns (still unrepresentable).
    This item re-opens the full hard-gating redesign because those
    two gaps remain and Sprint 12's directive promotion makes them
    production-visible.

  Relationship to Sprint 12 directive promotion:
    Sprint 12's shadow-directive-promotion-gate item ships v3 as
    directive WITH new LOCO + heterogeneous acceptance criteria
    (added 2026-04-15 in the companion commit). The
    sprint12-shadow-directive-promotion-gate-safety-analysis-memo
    produces a GREEN/YELLOW/RED verdict on whether flat v3 meets
    those criteria. This item is the long-form work that covers
    the RED case: if flat v3 cannot meet the LOCO/heterogeneous
    bars, Sprint 12 ships shadow-only and Sprint 13 lands the
    gated architecture via this item.

  Relationship to GLiNER-as-feature (separate research thread):
    Orthogonal. GLiNER-as-feature adds a new feature source to
    whatever classifier architecture is current. This item rebuilds
    the architecture. Either can ship first; they compound. If
    this item ships first, GLiNER-as-feature feeds the stage-2
    classifiers in each branch. If GLiNER-as-feature ships first,
    this item inherits the richer feature schema as its starting
    point.

  Relationship to the LR-vs-MLP question:
    The capacity-axis decision (LR / MLP / LR+interactions for
    the stage-2 classifiers) is answered by the Sprint 12
    safety-analysis-memo. Whichever model class wins that
    diagnostic becomes the stage-2 choice for this item. If
    LR wins, each branch uses its own LR with per-branch
    hyperparameter tuning. If MLP wins, each branch uses an
    MLP. The architecture change is independent of the model-class
    change within each branch.

  Original 2026-04-13 extension note (preserved for audit trail):
    The gated architecture needs THREE stage-1 outcomes, not two.
    Sibling gate for heterogeneous/log-shaped columns (e.g., log_line
    column containing a mix of emails, API keys, and free text).
    Per-value entropy variance + column name hints + partial regex
    match ratios signal heterogeneity. Output type for heterogeneous
    columns should be a list of per-entity findings with match_ratios,
    not a single classification. Requires a new HeterogeneousColumnFinding
    type (or extension of ClassificationFinding). Ties into
    Presidio-style span-level extraction for the log case.

  Why this item was a ghost for 2 sprints (post-mortem):
    The sprint planning process did not surface this item during
    Sprint 10 or Sprint 11 triage because all operational fields
    (goal, technical_specs, acceptance_criteria, complexity,
    sprint_target) were empty. An empty P1 item is un-schedulable
    because it cannot be sized, and an un-sized item cannot enter
    the sprint capacity calculation. The fleshing-out on 2026-04-15
    is a process-level fix as well as a content fix — future P1
    placeholders should be flagged during sprint start if they
    have empty operational fields, to prevent designed work from
    silently slipping.
