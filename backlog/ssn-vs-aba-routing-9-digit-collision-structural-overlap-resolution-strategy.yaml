- ABA checksum validator applied as secondary filter (3-7-1 weighted mod-10)
- Benchmark collision count reduced from 524 to under 100
- Pattern-level SSN precision improved from 0.436
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . && ruff format --check .)
