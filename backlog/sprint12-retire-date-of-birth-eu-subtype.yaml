description: "Sprint 11 Phase 10 A/B analysis confirmed that the DATE_OF_BIRTH vs\n\
  DATE_OF_BIRTH_EU split is a classification mistake:\n\n1. Sensitivity tier, regulatory\
  \ scope, and downstream handling are\n   identical regardless of format. GDPR /\
  \ CCPA / HIPAA / etc. treat\n   dates of birth as PII irrespective of whether stored\
  \ as MM/DD/YYYY\n   or DD/MM/YYYY.\n2. Format does NOT indicate jurisdiction \u2014\
  \ a US company may store\n   dates in EU format for internal reasons, a European\
  \ company may\n   use ISO-8601. Format != residency.\n3. The ambiguity is fundamentally\
  \ unresolvable for dates with day\n   <= 12 (more than half the year). No feature\
  \ engineering can fix\n   a distinction that is unknowable from the value alone.\n\
  4. Shadow cross-family A/B shows v3 gets the DATE *family* 100%\n   correct (P=1.000,\
  \ R=1.000, F1=1.000) \u2014 all 810 DOB-family shards\n   land in DATE. The remaining\
  \ 150 within-family confusions are\n   pure tie-breaking noise with identical confidences\
  \ on both sides.\n\nRetiring the subtype removes ~0.018 macro F1 penalty from the\n\
  benchmark while simplifying the taxonomy. Zero product impact.\n"
acceptance_criteria:
- DATE_OF_BIRTH_EU removed from all sources of truth (profile YAML, pattern library,
  taxonomy, tests, corpus loader)
- tests/test_date_of_birth_eu.py either retired or rewritten to assert EU-format DOBs
  land in DATE_OF_BIRTH
- Family benchmark DATE family F1 remains 1.000
- Family benchmark cross_family_rate does not regress
test_plan:
