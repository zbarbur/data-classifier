description: "The benchmark's NEGATIVE corpus contains values that look exactly like\
  \ real credentials (valid format, valid prefix, valid length) but are labeled NEGATIVE\
  \ because the source corpus (gitleaks, secretbench) considers them 'false positives'\
  \ due to being revoked, test, or example keys. For our use case \u2014 detecting\
  \ credential indicators \u2014 format-valid keys ARE true positives regardless of\
  \ revocation status. This mislabeling inflates our FP count by ~150 shards and deflates\
  \ NEGATIVE family F1 to 0.000. Cleaning this would give a more honest measurement\
  \ of actual precision."
acceptance_criteria:
- Review all 450 NEGATIVE shards and relabel format-valid credentials as CREDENTIAL
- Placeholder-patterned values (repeated X, repeated 0) remain NEGATIVE
- Non-credential strings (prose, code) remain NEGATIVE
- Benchmark family_macro_f1 reflects true precision after relabeling
- Nemotron taxonomy-drift artifact documented or corrected
test_plan:
- 'tests/benchmarks/family_accuracy_benchmark: re-run and verify NEGATIVE F1 > 0'
