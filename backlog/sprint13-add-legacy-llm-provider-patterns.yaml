- "Unit tests on bare-prefix-only (sk- alone, sk-ant- alone) \u2014 must not match"
- 'Integration: re-run S0 smoke (50K) on research/prompt-analysis after patterns land,
  check API_KEY count goes up if real OpenAI/Anthropic keys exist in WildChat'
- Family benchmark regression check
notes: "Estimated 0.5 day total (~50 LOC + tests).\n\nSurfaced 2026-04-16 by research/prompt-analysis\
  \ S0 coverage spike on\n17 canonical secret formats. Detailed analysis in\ndocs/experiments/prompt_analysis/queue.md\
  \ \xA7\"Secret detection track\"\nStage S1 (gap audit).\n\nWhy these two are split\
  \ off from the larger S3 pattern-mine item:\n  1. They're high-impact (LLM keys\
  \ are the dominant secret format\n     users would paste into a chat prompt extension)\n\
  \  2. They're well-documented by providers (no research time needed)\n  3. They\
  \ unblock the browser PoC catch rate before S3 lands\n\nFormat details verified\
