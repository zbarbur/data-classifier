goal: "Add two missing patterns surfaced by S0 coverage spike: OpenAI legacy sk-*\
  \ keys (no proj- prefix) and Anthropic sk-ant-api03-* keys. Both are dominant LLM\
  \ provider key formats with zero coverage in our current pattern set. The browser\
  \ PoC client (Chrome extension over ChatGPT) will see these regularly \u2014 current\
  \ scanner would miss them.\n"
complexity: S
technical_specs:
- 'Add OpenAI legacy pattern (entity_type=API_KEY, name=openai_legacy_key): regex
  \bsk-[a-zA-Z0-9]{48}\b. Validator: not_placeholder_credential (existing). Modern
  sk-proj-* keys have their own pattern (openai_api_key, already exists, requires
  80+ char suffix). Legacy keys are 48 chars after the sk- prefix. Stopwords: existing
  default placeholder list.'
- 'Add Anthropic pattern (entity_type=API_KEY, name=anthropic_api_key): regex \bsk-ant-(api[0-9]+|admin[0-9]+)-[a-zA-Z0-9_-]{93,}(?:-[a-zA-Z0-9]{2})?\b.
  Validator: not_placeholder_credential. Per Anthropic docs, current keys use sk-ant-api03-
  prefix; admin keys use sk-ant-admin01-. Format may evolve so the (api[0-9]+|admin[0-9]+)
  group is conservative.'
- 'Both patterns: confidence 0.95, sensitivity CRITICAL, family CREDENTIAL. Add provenance
  entry to docs/process/CREDENTIAL_PATTERN_SOURCES.md per the per-pattern provenance
  schema (source: provider documentation, license_clearance: factual-no-IP, pulled
  date, validator).'
- 'Tests: add fixtures to tests/test_regex_engine.py (or new tests/test_llm_provider_keys.py)
  covering: real-shape OpenAI legacy (cryptographically random 48-char suffix), real-shape
  Anthropic (95+ char suffix), placeholder rejection (sk-test-..., sk-ant-api03-EXAMPLE...),
  bare-prefix-only rejection (sk- alone), URL-embedded extraction, JSON-embedded extraction.'
- 'Source URLs to cite in CREDENTIAL_PATTERN_SOURCES.md: https://platform.openai.com/docs/api-reference/authentication
  https://docs.anthropic.com/en/api/getting-started'
description: "Surfaced from research/prompt-analysis S0 coverage spike (2026-04-16).\n\
  Spike tested 17 canonical secret formats against the current scanner;\nOpenAI legacy\
  \ and Anthropic both produced zero matches.\n\nThese are not bugs in existing patterns\
  \ \u2014 they are coverage gaps. The\nfix is to add new patterns derived from provider\
  \ documentation (per the\ntrufflehog-excluded source policy: provider docs are factual,\
  \ no IP\nexposure).\n\nScope rationale: this item adds the TWO most-glaring LLM\
  \ provider gaps\nidentified by S0. The broader S3 pattern-mine item (Sprint 14)\
  \ will\nhandle the rest of the LLM provider landscape (Gemini, Mistral,\nPerplexity,\
  \ Cohere, Together, Replicate, Groq) plus crypto/cloud-DB/\nwebhook/mobile-CI gaps.\
  \ Splitting these two off lets us ship them in\nSprint 13 without waiting for the\
  \ larger mine.\n\nBrowser PoC consideration: the Chrome extension client sees ChatGPT\n\
  prompts. Users pasting their OpenAI or Anthropic keys into a chat\nprompt is exactly\
  \ the leakage scenario the product is for. Shipping\nthese two patterns before the\
  \ PoC ships meaningfully improves catch\nrate on the highest-volume failure modes.\n"
acceptance_criteria:
- 'New pattern entries in data_classifier/patterns/default_patterns.json: openai_legacy_key
  + anthropic_api_key'
- Both patterns load via load_default_patterns() with regex+entity_type set
- CREDENTIAL_PATTERN_SOURCES.md entries with full provenance fields
- 'Test fixtures: each pattern has (a) real-shape match, (b) placeholder rejection,
  (c) bare-prefix rejection, (d) URL/JSON embedded extraction'
- All existing tests still pass; new tests pass
- Family benchmark does not regress
test_plan:
