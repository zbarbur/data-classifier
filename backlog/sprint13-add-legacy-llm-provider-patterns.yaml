  \ format, still in active use)\n  - OpenAI project: sk-proj-<160+ char base62 with\
  \ _ and ->\n    (already covered by openai_api_key pattern)\n  - Anthropic: sk-ant-(api|admin)NN-<95+\
  \ char base62 with - and _>(-XX)\n    (XX is optional 2-char checksum suffix)\n"
