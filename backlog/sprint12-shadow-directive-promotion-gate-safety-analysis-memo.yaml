  Filed 2026-04-15 as part of the Sprint 12 salvage intervention. This
  item addresses the discovery that the Sprint 12 promotion-gate's
  original acceptance criteria did not measure out-of-distribution
  quality (LOCO) or heterogeneous-column handling, both of which are
  known risks the Sprint 9 learning memo explicitly identified and
  designed the gated architecture to address.

  Companion items in the salvage intervention:
  - sprint12-shadow-directive-promotion-gate (updated 2026-04-15 to
    add LOCO and heterogeneous acceptance criteria + dependency on
    this memo)
  - gated-meta-classifier-architecture-explicit-credential-gate-
    specialized-stage-2-classifiers-q8-continuation (fleshed out
    2026-04-15 to target Sprint 13 with the full rebuild)

  This memo is the decision point. It does not commit to any
  particular Sprint 12 outcome — it produces evidence that the
  Sprint 12 owner uses to make the final go/no-go call on the
  directive flip. Three outcomes:

  1. GREEN → Sprint 12 proceeds as planned, directive flip ships,
     v0.12.0 to BQ with v4 as the sole classification path.
  2. YELLOW → Sprint 12 ships with specific mitigations (e.g.,
     confidence-threshold fallback to live cascade, per-family
     scoped promotion), v0.12.0 to BQ with v4 gated by
     conservatism mechanisms.
  3. RED → Sprint 12 ships v0.12.0 with shadow-only, the directive
     flip defers to Sprint 13 where the gated-architecture item
     closes the gaps. BQ consumer bump still happens (gets the
     2 new Sprint 12 features as shadow improvements) but the
     architectural change rolls to Sprint 13.

  Whichever outcome the memo produces, the decision is explicit and
  backed by measurement rather than inherited silently.
