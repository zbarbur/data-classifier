description: ''
acceptance_criteria:
- Each pattern in default_patterns.json can declare context_words_boost and context_words_suppress
  lists
- Context window scans N tokens before/after a regex match for context words
- Matching boost word adds configurable factor to confidence (default +0.3)
- Matching suppress word reduces confidence (default -0.3)
- 'Context populated for ambiguous patterns: ABA (routing, RTN), EIN (employer, tax),
  DOB (birth, born), SSN (social, security)'
- Case-insensitive context matching
- Tests pass (pytest tests/ -v)
- Lint clean (ruff check . && ruff format --check .)
test_plan:
- "tests/test_regex_engine.py: TestContextBoosting \u2014 verify boost with positive\
  \ context, suppress with negative context, no change without context"
- 'tests/test_regex_engine.py: test ABA routing + ''routing number:'' context vs bare
  9-digit number'
