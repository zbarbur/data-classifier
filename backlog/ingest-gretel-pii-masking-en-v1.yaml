notes: "Source: docs/experiments/meta_classifier/dataset_landscape.md on\nresearch/meta-classifier\
  \ (commit cd3a5cc, dispatched 2026-04-13).\n\nThis is item #1 in the recommended\
  \ ingestion order. It must land FIRST\nbecause:\n1. Its schema defines the canonical\
  \ span format we'll reuse for\n   gretel-finance and beki/privy (subsequent items)\n\
  2. It's the largest single bias-breaking add (60k mixed-label rows)\n3. ETL is straightforward\
  \ (NER-spans \u2192 column values, Ai4Privacy pattern)\n\nEXPECTED IMPACT on the\
  \ credential-bias problem:\n- Corpus count: 6 \u2192 7\n- Credentials no longer\
  \ live ONLY in label-pure corpora \u2014 gretel-en\n  contains MED-density credentials\
  \ mixed with HIGH PII + HIGH financial\n  + HIGH health labels in single documents\n\
  - The corpus_id \u2192 credential shortcut starts breaking down\n- Recommend a LOCO\
  \ re-measurement after this lands to quantify the bias\n  reduction (separate sub-task)\n\
  \nThis is the recommended PRIMARY action for fixing the meta-classifier\nLOCO collapse\
  \ \u2014 bigger leverage than E4 (heuristic_avg_length binning)\nand bigger leverage\
  \ than Q8 (specialized opaque-secret meta-classifier),\nboth of which work around\
  \ the bias rather than fixing it at the source.\n\nThe dataset's coverage spans\
  \ 47 domains: Healthcare, Banking, Financial\nServices, Government, Manufacturing,\
  \ Cybersecurity, Education. Single\ndocuments combine medical_record_number (26k\
  \ instances), date_of_birth\n(23k), ssn (16k), credit_card_number (6k), passwords/API\
  \ keys, etc.\n\nLicense: Apache 2.0 verified at dataset metadata. Standard attribution\n\
  requirements apply.\n\nFollow-up items in the same ingestion arc (file as separate\
  \ backlog YAMLs):\n- ingest-gretel-finance-multilingual.yaml (depends on this)\n\
  - generate-synthea-100k-patient-corpus.yaml (parallel to this)\n- ingest-beki-privy-sql-traces.yaml\
  \ (second-pass, depends on this)\n"
