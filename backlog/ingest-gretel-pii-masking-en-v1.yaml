goal: "Add gretelai/gretel-pii-masking-en-v1 (Apache 2.0, 60k rows, 47 domains) as the 7th training corpus for data_classifier. This is the highest-priority recommendation from the dataset landscape survey because it is the largest mixed-label open corpus available — single documents combine credentials, PII, financial, and health labels, which directly attacks the credential-pure-corpus structural bias driving the meta-classifier's LOCO collapse."
