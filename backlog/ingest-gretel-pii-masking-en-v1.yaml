notes: |
  Source: docs/experiments/meta_classifier/dataset_landscape.md on
  research/meta-classifier (commit cd3a5cc, dispatched 2026-04-13).

  This is item #1 in the recommended ingestion order. It must land FIRST
  because:
  1. Its schema defines the canonical span format we'll reuse for
     gretel-finance and beki/privy (subsequent items)
  2. It's the largest single bias-breaking add (60k mixed-label rows)
  3. ETL is straightforward (NER-spans → column values, Ai4Privacy pattern)

  EXPECTED IMPACT on the credential-bias problem:
  - Corpus count: 6 → 7
  - Credentials no longer live ONLY in label-pure corpora — gretel-en
    contains MED-density credentials mixed with HIGH PII + HIGH financial
    + HIGH health labels in single documents
  - The corpus_id → credential shortcut starts breaking down
  - Recommend a LOCO re-measurement after this lands to quantify the bias
    reduction (separate sub-task)

  This is the recommended PRIMARY action for fixing the meta-classifier
  LOCO collapse — bigger leverage than E4 (heuristic_avg_length binning)
  and bigger leverage than Q8 (specialized opaque-secret meta-classifier),
  both of which work around the bias rather than fixing it at the source.

  The dataset's coverage spans 47 domains: Healthcare, Banking, Financial
  Services, Government, Manufacturing, Cybersecurity, Education. Single
  documents combine medical_record_number (26k instances), date_of_birth
  (23k), ssn (16k), credit_card_number (6k), passwords/API keys, etc.

  License: Apache 2.0 verified at dataset metadata. Standard attribution
  requirements apply.

  Follow-up items in the same ingestion arc (file as separate backlog YAMLs):
  - ingest-gretel-finance-multilingual.yaml (depends on this)
  - generate-synthea-100k-patient-corpus.yaml (parallel to this)
  - ingest-beki-privy-sql-traces.yaml (second-pass, depends on this)
