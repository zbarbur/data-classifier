- "File: tests/fixtures/gretel_en_sample.json \u2014 sample slice for unit tests (small\
  \ subset, ~50 rows)"
- "File: tests/benchmarks/meta_classifier/build_training_data.py \u2014 wire gretel-en\
  \ into the corpus list for training data builds"
- "File: tests/test_corpus_loader.py \u2014 add test_load_gretel_en_corpus + test_gretel_en_type_map_coverage"
- "File: docs/experiments/meta_classifier/dataset_landscape.md \u2014 mark this dataset\
  \ as 'ingested' once landed"
