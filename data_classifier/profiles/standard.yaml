# Classification profiles for structured column classification.
#
# Each profile contains rules ordered by specificity (most specific first).
# Column matching is case-insensitive; first matching rule wins.
#
# Pattern format: regex matched against the full lowercased column name.
# Anchors (^, $) are optional — patterns use word-boundary style matching.
#
# Categories group entity types by kind of sensitive data:
#   PII        — Personal identity data
#   Financial  — Financial/payment data
#   Credential — Authentication secrets
#   Health     — Protected health information

profiles:
  standard:
    name: standard
    description: >
      Standard classification profile.
      Covers 15 entity types across 4 categories and 4 sensitivity levels.

    rules:

      # ── CRITICAL ──────────────────────────────────────────────────────────

      - entity_type: SSN
        category: PII
        sensitivity: CRITICAL
        regulatory: [PII, HIPAA, SOX, GDPR]
        confidence: 0.95
        patterns:
          - "(^|_)(ssn|social_security|social_security_number|taxpayer_id)(_|$)"

      # ── Credential subtypes (Sprint 8 Item 4) ─────────────────────────────
      # CREDENTIAL was split into four deterministic subtypes. All rollup
      # under ``category: Credential`` so consumers can still query a single
      # category. Order: more specific (PRIVATE_KEY, PASSWORD_HASH, API_KEY)
      # before the catch-all OPAQUE_SECRET.

      - entity_type: PRIVATE_KEY
        category: Credential
        sensitivity: CRITICAL
        regulatory: [PCI_DSS, SOC2]
        confidence: 0.95
        patterns:
          - "(^|_)(private_key|privatekey|pem_key|rsa_private_key|ssh_private_key|pgp_private_key)(_|$)"

      - entity_type: PASSWORD_HASH
        category: Credential
        sensitivity: CRITICAL
        regulatory: [PCI_DSS, SOC2]
        confidence: 0.95
        patterns:
          - "(^|_)(password_hash|hashed_password|pwd_hash|pass_hash|password_digest|bcrypt_hash|argon2_hash|scrypt_hash|crypt)(_|$)"

      - entity_type: API_KEY
        category: Credential
        sensitivity: CRITICAL
        regulatory: [PCI_DSS, SOC2]
        confidence: 0.95
        patterns:
          - "(^|_)(api_key|apikey|api_secret|api_token|access_key|access_token|auth_token|bearer_token|client_secret|oauth_token|oauth_secret|refresh_token|service_account_key|secret_token)(_|$)"

      - entity_type: OPAQUE_SECRET
        category: Credential
        sensitivity: CRITICAL
        regulatory: [PCI_DSS, SOC2]
        confidence: 0.90
        patterns:
          - "(^|_)(password|passwd|passcode|pwd|passphrase|secret|credential|credentials|token)(_|$)"

      - entity_type: CREDIT_CARD
        category: Financial
        sensitivity: CRITICAL
        regulatory: [PCI_DSS, PII]
        confidence: 0.95
        patterns:
          - "(^|_)(credit_card|creditcard|card_number|cardnumber|cc_number|ccnumber|pan|payment_card)(_|$)"

      # ── HIGH ──────────────────────────────────────────────────────────────

      - entity_type: EMAIL
        category: PII
        sensitivity: HIGH
        regulatory: [PII, GDPR, CAN_SPAM]
        confidence: 0.90
        patterns:
          - "(^|_)(email|email_address|emailaddress|mail|e_mail)(_|$)"

      - entity_type: PHONE
        category: PII
        sensitivity: HIGH
        regulatory: [PII, GDPR, TCPA]
        confidence: 0.90
        patterns:
          - "(^|_)(phone|phone_number|phonenumber|telephone|tel|mobile|cell|fax)(_|$)"

      - entity_type: DATE_OF_BIRTH
        category: PII
        sensitivity: HIGH
        regulatory: [PII, HIPAA, GDPR, COPPA]
        confidence: 0.90
        patterns:
          - "(^|_)(dob|date_of_birth|dateofbirth|birth_date|birthdate|birthday|birth_year)(_|$)"

      - entity_type: DATE_OF_BIRTH_EU
        category: PII
        sensitivity: HIGH
        regulatory: [PII, HIPAA, GDPR, COPPA]
        confidence: 0.90
        patterns:
          - "(^|_)(dob_eu|date_of_birth_eu|birth_date_eu|geburtsdatum|date_naissance|fecha_nacimiento|data_nascita)(_|$)"

      - entity_type: FINANCIAL
        category: Financial
        sensitivity: HIGH
        regulatory: [PII, SOX, GDPR]
        confidence: 0.85
        patterns:
          - "(^|_)(salary|income|wage|compensation|revenue|earnings|net_worth|tax_amount|annual_income|gross_pay|net_pay)(_|$)"

      - entity_type: NATIONAL_ID
        category: PII
        sensitivity: HIGH
        regulatory: [PII, GDPR]
        confidence: 0.90
        patterns:
          - "(^|_)(national_id|nationalid|passport|passport_number|drivers_license|driver_license|dl_number|id_number|govt_id|government_id|national_insurance)(_|$)"

      - entity_type: NPI
        category: Health
        sensitivity: HIGH
        regulatory: [PII, HIPAA]
        confidence: 0.90
        patterns:
          - "(^|_)(npi|national_provider|national_provider_id|provider_npi)(_|$)"

      - entity_type: DEA_NUMBER
        category: Health
        sensitivity: HIGH
        regulatory: [PII, HIPAA, DEA]
        confidence: 0.90
        patterns:
          - "(^|_)(dea|dea_number|dea_registration)(_|$)"

      - entity_type: MBI
        category: Health
        sensitivity: HIGH
        regulatory: [PII, HIPAA, CMS]
        confidence: 0.90
        patterns:
          - "(^|_)(mbi|medicare_beneficiary|medicare_id|medicare_number)(_|$)"

      - entity_type: HEALTH
        category: Health
        sensitivity: HIGH
        regulatory: [PII, HIPAA, GDPR]
        confidence: 0.90
        patterns:
          - "(^|_)(diagnosis|icd_code|medical_record|mrn|patient_id|health_condition|prescription|medication|drug_name|lab_result|blood_type|medical_history)(_|$)"

      - entity_type: CANADIAN_SIN
        category: PII
        sensitivity: HIGH
        regulatory: [PII, PIPEDA]
        confidence: 0.90
        patterns:
          - "(^|_)(sin|social_insurance|social_insurance_number)(_|$)"

      - entity_type: IBAN
        category: Financial
        sensitivity: HIGH
        regulatory: [PCI_DSS, PII, GDPR]
        confidence: 0.90
        patterns:
          - "(^|_)(iban|iban_code|iban_number)(_|$)"

      - entity_type: BANK_ACCOUNT
        category: Financial
        sensitivity: HIGH
        regulatory: [PCI_DSS, PII, GDPR]
        confidence: 0.90
        patterns:
          - "(^|_)(bank_account|bankaccount|account_number|accountnumber|sort_code|bsb_number)(_|$)"

      - entity_type: SWIFT_BIC
        category: Financial
        sensitivity: HIGH
        regulatory: [PCI_DSS, PII]
        confidence: 0.90
        patterns:
          - "(^|_)(swift|bic|swift_code|bic_code|swift_bic)(_|$)"

      - entity_type: ABA_ROUTING
        category: Financial
        sensitivity: HIGH
        regulatory: [PCI_DSS, PII]
        confidence: 0.90
        patterns:
          - "(^|_)(aba|aba_routing|routing_transit|rtn)(_|$)"

      - entity_type: BITCOIN_ADDRESS
        category: Financial
        sensitivity: HIGH
        regulatory: [PII]
        confidence: 0.85
        patterns:
          - "(^|_)(bitcoin|btc|btc_address|bitcoin_address|bitcoin_wallet)(_|$)"

      - entity_type: ETHEREUM_ADDRESS
        category: Financial
        sensitivity: HIGH
        regulatory: [PII]
        confidence: 0.85
        patterns:
          - "(^|_)(ethereum|eth|eth_address|ethereum_address|ethereum_wallet)(_|$)"

      - entity_type: EIN
        category: Financial
        sensitivity: MEDIUM
        regulatory: [PII, SOX]
        confidence: 0.85
        patterns:
          - "(^|_)(ein|employer_id|employer_identification|tax_id|fein|federal_ein)(_|$)"

      # ── MEDIUM ────────────────────────────────────────────────────────────
      # NOTE: MAC_ADDRESS and IP_ADDRESS must come before ADDRESS (more specific match first)

      - entity_type: MAC_ADDRESS
        category: PII
        sensitivity: MEDIUM
        regulatory: [PII]
        confidence: 0.85
        patterns:
          - "(^|_)(mac_address|macaddress|mac_addr|hardware_address|physical_address|device_mac)(_|$)"

      - entity_type: VIN
        category: PII
        sensitivity: MEDIUM
        regulatory: [PII]
        confidence: 0.85
        patterns:
          - "(^|_)(vin|vehicle_id|vehicle_identification|vehicle_number|chassis_number)(_|$)"

      - entity_type: IP_ADDRESS
        category: PII
        sensitivity: MEDIUM
        regulatory: [PII, GDPR]
        confidence: 0.85
        patterns:
          - "(^|_)(ip_address|ipaddress|ip_addr|ipaddr|client_ip|source_ip|remote_ip|user_ip)(_|$)"

      - entity_type: ADDRESS
        category: PII
        sensitivity: MEDIUM
        regulatory: [PII, GDPR]
        confidence: 0.80
        patterns:
          - "(^|_)(address|street|street_address|city|state|province|zip|zipcode|postal_code|postalcode|country|region|municipality)(_|$)"

      - entity_type: PERSON_NAME
        category: PII
        sensitivity: MEDIUM
        regulatory: [PII, GDPR]
        confidence: 0.75
        patterns:
          - "(^|_)(first_name|firstname|last_name|lastname|full_name|fullname|given_name|surname|middle_name|legal_name)(_|$)"

      # ── LOW ───────────────────────────────────────────────────────────────

      - entity_type: DEMOGRAPHIC
        category: PII
        sensitivity: LOW
        regulatory: [PII, EEOC]
        confidence: 0.70
        patterns:
          - "(^|_)(gender|sex|ethnicity|race|nationality|religion|marital_status|education_level|occupation)(_|$)"

      - entity_type: AGE
        category: PII
        sensitivity: LOW
        regulatory: [PII, COPPA]
        confidence: 0.75
        patterns:
          - "(^|_)(age|age_group|age_range|age_band|age_at_enrollment)(_|$)"
