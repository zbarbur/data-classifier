heuristic_engine:
  min_samples: 10
  signals:
    cardinality:
      low_threshold: 0.05    # ratio below this → categorical/lookup (ABA)
      high_threshold: 0.80   # ratio above this → unique identifiers (SSN)
    entropy:
      high_threshold: 4.0    # bits/char → possible secrets/hashes
    length:
      consistency_threshold: 0.95  # fraction with same length → formatted ID
    char_class:
      digit_purity_threshold: 0.95  # fraction of values that are all-digits
      mixed_char_threshold: 0.50    # fraction of values that are alnum+special (for credential detection)

secret_scanner:
  min_value_length: 8
  anti_indicators:
    - example
    - test
    - placeholder
    - changeme
  opaque_token:
    min_length: 16              # standalone token minimum (not KV values)
    entropy_threshold: 0.7      # relative entropy floor
    diversity_threshold: 3      # char-class count floor
    base_confidence: 0.65       # starting confidence
    max_confidence: 0.85        # confidence cap
  scoring:
    tier_boundaries:
      definitive: 0.90       # key score >= this → key name alone sufficient
      strong: 0.70            # key score >= this → needs moderate value signal
    definitive_multiplier: 0.95  # composite = key_score × this
    strong_min_entropy_score: 0.6  # minimum entropy score for strong tier
    relative_entropy_thresholds:
      strong: 0.5             # strong tier: relative entropy >= this OR diversity >= 3
      contextual: 0.7         # contextual tier: relative entropy >= this AND diversity >= 3
    diversity_threshold: 3    # minimum character classes (upper/lower/digit/special)
    prose_alpha_threshold: 0.6  # value with >60% alpha + spaces = prose (not a secret)

collision_resolution:
  gap_threshold: 0.15         # minimum confidence gap to suppress lower finding

gliner_engine:
  per_value_sample_size: 60
